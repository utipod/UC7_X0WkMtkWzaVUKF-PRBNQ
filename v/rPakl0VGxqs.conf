description = "Implementing SSI and Token Economics in Metaverse using Blockchain - Vikram Sharma & Karthik Sukumaran, HCL Technologies Ltd\n\nMetaverse is still in its infancy but it is attributed with a lot of potential to change how we socialize, play games, or conduct business. Metaverses are created with real-life like scenes to provide the users with real-world like experience using a combination of technologies. Those primarily include AR/VR/MR, Blockchain, 3D Content Creation tools, IoT and Artificial Intelligence. Most of the Metaverse currently existing are siloes and the identities of Users are also limited to platform itself. Thus, any assets created, or acquired in one Metaverse cannot be moved to another. The focus however has started moving towards interoperability and it is therefore imperative that the identity is decentralized and allows user to maintain relationships with multiple Metaverse with one identity. Also, many use-cases require users to prove that they are who they claim they are. This emphasizes the need for Verified Credentials and SSI. In this session, we would cover, how we can implement a SSI to be used for decentralization and enable token economics using Hyperledger projects. The session will also include the architecture, challenges and learnings from the implementation. \n\nSessions Details & Slides (if available): https://sched.co/14H6D\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
