description = "Decentralized Control with IBM Blockchain Platform - Gari Singh, IBM \n\nA core tenet of blockchain is decentralized control.Such control ensures Blockchain data and transactions can be trusted and not compromised by any single party.A traditional blockchain-as-a -service offering (where one vendor runs everything) undermines this basic tenet.Further, even running all of the nodes in the same cloud can undermine this tenet .Decentralized control is what our production customers want and what the market has demanded\n\nWith IBM Blockchain Platform, we introduced the concept of a "blockchain management platform" which provides an ideal offering where a vendor offloads the management and maintenance of the blockchain nodes but at the same time the owner(s) of the node(s) still retain full control of their nodes and cryptographic material .Come see Gari Singh demonstrate the latest on IBM Blockchain Platform that can run anywhere (on any cloud or on premise) and get advice on how to implement your blockchain applications using the latest capabilities in Hyperledger Fabric or IBM Blockchain Platform.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
