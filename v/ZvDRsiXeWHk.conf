description = "One of the world’s pressing challenges and opportunities is realising the full benefits of digital trade – for everyone, everywhere. COVID-19 highlighted the fragility of global trade’s reliance on paper-based processes and the pandemic has added urgency to the need for a resilient rebuild of digitisation of the global trade ecosystem. Since its inception five years ago, Hyperledger technologies have played a key role towards achieving this goal.\n\nIn this panel, you will hear from the International Chamber of Commerce (ICC) on its major new initiative to establish a globally harmonised, digitised trade environment. Hyperledger members and blockchain leaders will discuss the development and state of blockchain solutions for trade and trade finance today. The panel will examine issues including:\n\n- the progress, pitfalls and opportunities companies and consortiums working on blockchain for trade and trade finance are facing\n- which are the platforms to watch\n- progress in interoperability and identity\n- regulatory developments and challenges\n- how to monetise on a blockchain trade finance platform\n- how small and medium sized enterprises can take part – democratising access to global markets\n\nMark Cudden, CTO, we.trade\nEmmanuelle Ganne, Senior Analyst, Economic Research Department, World Trade Organization\nOswald Kuyler, Managing Director, Digital Standards Initiative, ICC\nAtul Patel, Chief Platform Officer, dltledgers\nParm Sangha, Global Blockchain Leader for Trade & Trade Finance, IBM\nJulian Gordon, VP Asia Pacific, Hyperledger\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
category = "Education"
title = "Examining Blockchain’s Transformative Role in Digitising Trade and Trade Finance"
