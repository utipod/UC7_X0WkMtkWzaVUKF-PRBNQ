description = "Nicko Guyer, FireFly Community Lead, and Peter Broadhurst, Co-founder and Head of Engineering at Kaleido, provide an overview of how the Hyperledger FireFly project works to orchestrate event-driven flows with built-in identity management.  \n\nWhen doing off-chain transfers of data, you need to know who you’re transacting with. FireFly comes out of the box with a multi-party system mode that has a built-in network map. The system uses DID syntax to represent verified identities. FireFly is then able to interact with other blockchain solutions that use a self-sovereign identity system backed by DID.\n\nHyperledger FireFly is a complete stack for enterprises to build and scale secure Web3 applications. As an open source project, anyone who is interested in Hyperledger FireFly is welcome to use the code, ask questions in the project's forums and join the community and contribute to the project.\n\nJoin us on the Hyperledger FireFly Discord:\nhttps://discord.gg/Fy7MJuqw86\n\nDownload the Hyperledger FireFly CLI:\nhttps://github.com/hyperledger/firefly-cli\n\nHyperledger FireFly GitHub:\nhttps://github.com/hyperledger/firefly\n\nHyperledger FireFly Wiki:\nhttps://wiki.hyperledger.org/display/FIR/Hyperledger+FireFly+Home\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
