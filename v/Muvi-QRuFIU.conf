description = "A Blockchain-enabled Solution to Drive Material Traceability Along the Pharmaceutical Supply Chain in Asia - Daniel Laverick & Zhang Haisheng, Zuellig Pharma\n\nPharmaceutical supply chains are complex structures spanning across multiple organizations and stakeholders along its handover points. Such system complexities generate a lack of transparency, limited data provenance and the inherent inability to track the healthcare products’ activities. Counterfeit drugs, parallel imports, operational inefficiencies resulting in compromised product integrity and hence product wastage are consequences of such limitations within existing supply chains. It is apparent that an end-to-end product tracking visibility across the pharmaceutical supply chain is paramount to ensure product safety to its end-users as well as minimize manufacturers’ operational costs. \n \nHere, we present our solution, eZTracker, which is powered by Blockchain Hyperledger Fabric. Our speakers will share today’s challenges in pharmaceutical supply chain visibility and collaboration, as well as our system architecture that govern our proposed solution to address the needs for pharma material traceability and quality reassurance. Used cases in Asia will also be shown to illustrate our blockchain-enabled journey and the outcomes we aim to achieve in the near future. \n\nTo learn more about Hyperledger, the open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments. Which serves as a neutral home for various distributed ledger frameworks including Hyperledger Fabric, Sawtooth, Indy, as well as tools like Hyperledger Caliper and libraries like Hyperledger Ursa click here: https://www.hyperledger.org/\n\nSession Details & Slides (if available)- https://sched.co/jgMg\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
