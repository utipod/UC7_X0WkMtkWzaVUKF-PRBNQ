title = "Investigations in a Decentralised Landscape (When Blockchains Go Bad!)"
description = "Simon Dyson, Yorkshire & Humber Regional Cyber Crime Unit\n\nCryptocurrency and blockchain technologies are changing the way that value and data is transferred and stored. Bitcoin was the genesis that turned the wheel to the development of blockchain and is subsequently extensively written about. In this talk Simon explores the difficulties that investigators face with the new wave of privacy currencies, decentralised exchanges and smart contracts. As non-permissioned blockchains develop the new web technologies that can host persistent secure decentralised websites or content a new paradigm is born. Storage solutions, messaging applications and decentralised social media are all deployed or in development. Incident response is explored using examples of when blockchain goes bad. The talk gives a unique take by looking through the lens of those who are required to adapt to new technology and to serve the public.\n\nhttps://hgf18.sched.com/event/G8sB/investigations-in-a-decentralised-landscape-when-blockchains-go-bad-simon-dyson-yorkshire-humber-regional-cyber-crime-unit\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2018 #Blockchain"
