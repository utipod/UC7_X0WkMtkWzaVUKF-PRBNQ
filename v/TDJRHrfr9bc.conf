title = "Case Study: Credit Unions Adopt Decentralized Identity – Successes... Julie Esser & Chris Kearney"
description = "Case Study: Credit Unions Adopt Decentralized Identity – Successes, Challenges and Lessons Learned from MyCUID Pilot Programs - Julie Esser, CULedger & Chris Kearney, TruWest Credit Union \n\nData security, particularly around identity, has become a major concern for consumers everywhere due to ongoing data breaches and waves of identity. In the financial industry, digital identity protection is especially crucial. Innovative credit unions have collaborated to develop CULedger, a credit union service organization offering MyCUID, a consumer-focused global digital identity solution.\n\nJoin CULedger and leaders from credit unions currently utilizing MyCUID to learn about the lessons learned during implementation, how success was defined throughout the pilot programs and key takeaways that can be applied to any SSI initiative. Attendees will also hear how this technology has helped credit unions better manage Know-Your-Customer regulatory requirements, expedite identity verification in-person, on the phone and online, and enhance the overall security and protection of credit union members.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
