title = "Tokenization use cases with Peter Gaffney - FMSIG Mortgage Industry Subgroup Update"
description = "The April Mortgage Industry Subgroup Update had an enriching conversation on #tokenization and use cases with Peter Gaffney, Head of Research at Security Token Advisors, where he primarily advises and facilitates security token offerings, tokenization, and NFT implementation on behalf of clients in diverse (and very creative) industries.\n\nPresented by mortgage industry subgroup co-chair Marvin Bantugan, and James Hendrick providing an update on the state of blockchain in the mortgage industry.\n\nTimestamps:\n00:00 Welcome and presentation\n02:38 Community information\n03:25 Status of Blockchain in the mortgage in the mortgage industry\n10:42 Tokenization use cases with Peter Gaffney\n53:40 Thoughts from the 2023 MBA Technology Conference\n\nJoin the FMSIG Mortgage Subgroup Wiki: https://wiki.hyperledger.org/display/CMSIG/FMSIG+Mortgage+Industry+Subgroup\n\nSubscribe to the mailing list to receive the latest updates: https://lists.hyperledger.org/g/financial-markets-sig\n\nFollow the Hyperledger Financial Markets Special Interest Group LinkedIn page: https://www.linkedin.com/showcase/hyperledger-financial-markets-sig/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
