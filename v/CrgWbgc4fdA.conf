description = "Moderated by Rose Shuman, BrightFront Group\n\nCountries around the world struggle with patronage political culture, political party supporters are rewarded with contracts to build roads, schools, hospitals. In the vein of recouping 'expenses', these contractors cut costs. The result is a case of poorly constructed roads, inadequate facilities and the consequent deaths in hospitals, dysfunctional school systems and numerous road accidents. Global South is really pioneering the extended use of enterprise-grade blockchain solutions in governmental processes to promote transparency and accountability. From the integration of Brazilian banks to maximize identification of banknote exchange opportunities to coffee trading in Africa, there is no limit to Blockchain innovation. Metropolis as the World Association of Large Metropolis has 138 member metropolitan regions around 5 continents. Out of them 69 are already using the technology in 255 projects! Let's discuss how Global South utilizes Blockchain, strategic guidelines for the development of DLT applications to solve particular urban issues of citizenship and democracy, land and real estate markets, infrastructure and public services, exchanges of total values, financial and non-financial, governance and finance\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: 