description = "Daniel A Zaretsky & Kevin Leeds, Pravici LLC\n\nReal-world, empirical data/results will be the focus in the following areas: 1) Lessons learned during Integration of blockchain and existing Loyalty Platform 2) Strategy for authenticating the participants within and between systems. 3) PSR (performance, scalability, reliability) test results and status.\n\nPravici LLC are experts in Customer Loyalty Programs Systems and are currently implementing what may become one of the largest Customer Loyalty Programs in history. Dan Zaretsky, Pravici VP Blockchain and DLT will describe the results to-date for this exciting real-world application of blockchain.\n\nTechnical Overview:o Business Network definition deploy – Hyperledger Composer\nBlockchain – Hyperledger Fabric\nAuthentication – LDAP\nEnrollment – Certificates stored in wallets\nAPI 1: Legacy Back-end Blockchain – Web Services\nAPI 2: Front-end Blockchain – Web Services\n\nThe presentation will provide a to-date status of the project in the following areas: User/Participant Authentication, Performance characteristics, Scalability characteristics, Architecture Lessons, Integration Lessons.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
