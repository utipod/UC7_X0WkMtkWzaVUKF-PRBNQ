description = "Open source software has the potential to level the playing field when it comes to diversity and inclusion - communities are open to everyone, it's a meritocracy, and there are ample opportunities to build your resume and network while working alongside developers and engineers from forward-thinking companies like Walmart, Netflix, Disney, Microsoft, AT&T, Toyota, Uber, and more. There are thousands of communities out there where you can get started, learn new skills, develop/refine those skills, and gain experience that can lead to careers in tech, retail, motion pictures, banking, automotive, and more. Join us to learn how open source software is used by major motion picture studios like Netflix and Industrial Light & Magic for visual effects, and by major retailers like Walmart for blockchain. We'll also provide some insights into training and education opportunities from the Linux Foundation.\n\nLearn More about about the open source projects that these women participate and contribute to:\nLinux Foundation: https://www.linuxfoundation.org/\nLinux Foundation Training: https://training.linuxfoundation.org/\nHyperledger Enterprise blockchain  https://www.hyperledger.org/\nAcademy Software Foundation (ASWF) https://www.aswf.io/\nThe Cloud Native Computing Foundation (CNCF) https://www.cncf.io/\n\nResources for joining the Hyperledger community\nHow to Participate: https://www.hyperledger.org/participate\nJoin a community Group: https://www.hyperledger.org/participate/join-a-group\nFind a local meetup community: https://www.meetup.com/pro/hyperledger/\nNeed more info? info@hyperledger.org\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
category = "Education"
title = "Grace Hopper Celebration 2020 Linux Foundation Cool Careers in Open Source Walmart, Netflix, Disney"
