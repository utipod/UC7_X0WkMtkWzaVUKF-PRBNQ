description = "Covid Vaccine Beneficiary Identification using Verifiable Credentials - Punit Kumar & Hitarshi Buch, Wipro Technologies\n\nCOVID vaccination drives are being carried out across the globe. It is imperative to identify and segregate persons with the highest risk of infection so that the vaccine can be administered to them first. Therefore it is important that the individual's identity is established and their vaccine eligibility is determined in a secure and trust worthy way.\n\nPunit & Hitarshi will be showcasing a solution that leverages the power of DID (Decentralized Identity) and Verifiable credentials, which helps in determining the vaccine beneficiaries by ensuring that the individual has the required authorization. This solution is built using Hyperledger Indy and Aries and comprises of the identity holder (beneficiary), identity issuer (nation health agency) and identity verifier (vaccine providers). \n\nTo learn more about Hyperledger, the open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments. Which serves as a neutral home for various distributed ledger frameworks including Hyperledger Fabric, Sawtooth, Indy, as well as tools like Hyperledger Caliper and libraries like Hyperledger Ursa click here: https://www.hyperledger.org/\n\n\nSession Details & Slides (if available)- https://sched.co/jgTf\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
