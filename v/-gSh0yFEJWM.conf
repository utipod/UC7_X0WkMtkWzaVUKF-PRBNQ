description = "Blockchain as a Power for Good in the Battle against Climate Change, at Davos 2022\n\nHosted in partnership by the Hyperledger Foundation with the Filecoin Foundation and CNBC. \n\nBlockchain as a Power for Good in the Battle against Climate Change\nBattling the climate crisis requires a large-scale, coordinated effort by parties around the world. And, in the era of greenwashing and misinformation, transparency and verification are among the most important weapons. While the energy-intensive mining practices of some cryptocurrencies may make it seem counterintuitive, blockchain has an increasingly important role to play in driving down carbon footprints and ensuring climate promises are met and kept. This panel will cover pathways to sustainability for blockchain technologies and growing adoption of tokens, credentials, smart contracts and more in the climate fight.\n\nSpeakers: \nAlex Altman - COO, Seal Storage\nDouglas Johnson-Poensgen - CEO, Circulor\nDr. Andreas Kind - Head of Cybersecurity Technology, Siemens\nModerator:\nDaniela Barbosa - Executive Director, Hyperledger Foundation\nEvent website: https://hub.fil.org/davos\n\nThe World Economic Forum Annual Meeting in Davos-Klosters is the foremost creative force for engaging the world’s top leaders in collaborative activities to shape the global, regional and industry agendas. In this regard, the Forum’s mission – improving the state of the world – guides the design and development of the Annual Meeting objectives.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
