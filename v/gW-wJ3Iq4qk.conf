description = "Supply Chain SIG - Tokenization to improve Agriculture Supply Chains Johannes Pulsfort, Doctoral Candidate / Teaching and Research Associate at Vienna University of Economics and Business in the Institute for Transport, Logistics and Supply Chain Management.\n\nJohannes focuses on blockchain technology research in supply chains and how to apply blockchain technology in real-world use-cases. Furthermore, Johannes works as an academic researcher for the blockchain interface startup Riddle & Code and acquired supply chain strategy experience as a BCG and Accenture strategy and management consultant.\n\n “The digital transformation of agricultural supply chains creates new challenges for a safe, secure, and efficient data exchange between agricultural supply chain stakeholders. This digital transformation requires establishing end-to-end supply chain visibility and transparency of product movements and provenance within the supply network from product origin to final consumer. Blockchain can help resolve challenges related to traceability, transparency, and security in supply chains by ensuring data protection from non-authorized revision, tampering, or deletion. In addition, leveraging exponential technology, in particular distributed ledger technologies (DLT) and blockchain that allows for data tokenization, storage of verified impact data, and securitization has created the opportunity to rethink and articulate new categories of business and financing models in agriculture. This webinar will focus on how tokenization and blockchain can improve family farmers’ ability to achieve economic prosperity and promote more responsible supply chains.”\n\nBlockchain and AI on Lifelong Healthcare - Diógenes José Firmiano, IAsis\n\nIn a world where health has become a fundamental part, technologies such as blockchain and artificial intelligence have become fundamental in our lives. Brazil implemented in the midst of a pandemic the National Health Data Network implemented using Hyperledger Fabric and today has more than 1 billion records. This project is the foundation for providing health data interoperability and enabling the implementation of a personal health record aligned with the GDPR and creating a health avatar. This structure of healthtech 5.0 allows the application of artificial intelligence to make medical decisions along the lines of a support system for clinical decisions. \n\nTo learn more about Hyperledger, the open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments. Which serves as a neutral home for various distributed ledger frameworks including Hyperledger Fabric, Sawtooth, Indy, as well as tools like Hyperledger Caliper and libraries like Hyperledger Ursa click here: https://www.hyperledger.org/\n\nSession Details & Slides (if available)- https://sched.co/j3ax\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
