description = "Reducing Worker’s Comp Fraud in CA with Hyperledger Fabric. A Technical Deep Dive - David Berger, Integra Ledger \n\nReducing Worker’s Comp Fraud in CA with Hyperledger Fabric.\nA Technical Deep Dive.\nDavid Berger, CTO Integra Ledger\n\nIn May, Discovery as a Service (DaaS) company Arcuity ai, Inc™. (www.arcuityai.com) announced they are working with Integra Ledger and have developed ArcuityVizion™, a blockchain-based technology to enhance efficiency and security in record retrieval and sharing of documents in litigated and non-litigated workers' compensation cases.\n\nRecord retrieval has historically been a time-intensive, manual process with significant duplication of work and costs by law firms and copy services throughout the legal industry. Those excess costs get passed on to insurers and the longer a claim takes to close, the more expensive it becomes ArcuityVizion™ will streamline the retrieval and sharing of records guaranteed identical to the custodian of record.This will help eliminate fraud and significantly improve the speed of resolution of claims.\n\nThe blockchain substrate utilizes Integra’s Hyperledger Fabric Proof of Existence based API which was presented at the 2018 Hyperledger Global Forum, “Demo of a Real World Deployed Hyperledger Composer/Fabric Blockchain.”\n\nThe presentation will include a live demo and cover the technical choices including:\n• Emphasizing that only the Document Hash is stored on the ledger\n• The move from Hyperledger Composer to The Hyperledger Node SDK\n• The move from using IBM Blockchain Platform to a multi cloud Self-Hosting model\n• The choice of Kubernetes, Helm Charts and Rancher\n• The advantage on utilizing XMP PDF Metadata\n• The UI impact of utilizing embedded QRCodes in the documents along with the challenge this brings as the embedded QRCode changes the hash of the document.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
