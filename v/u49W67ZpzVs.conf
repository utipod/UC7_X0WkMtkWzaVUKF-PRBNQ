description = "This was recorded on Day 2 of the Hyperledger Besu Financial Services Workshop\n\nThanks to Matt Nelson from Consensys for sharing his knowledge with the community. The wiki page (including deck slides) for this event can be found here:\nhttps://wiki.hyperledger.org/pages/viewpage.action?pageId=80779270\n\nFind Out More About Besu\nHyperledger Besu Wiki: https://wiki.hyperledger.org/display/besu\nHyperledger Besu GitHub: https://github.com/hyperledger/besu\nHyerledger Besu Discord:  https://discord.gg/hyperledger\nHyperledger Besu “Find Your First Ticket”: https://github.com/hyperledger/besu/contribute/\nHyperledger Besu YouTube Playlist: https://www.youtube.com/playlist?list=PL0MZ85B_96CE3sGM0pdZbwaOb17CKEP\nBesu Getting Started \nPublic Ethereum: Connect to a testnet\nPrivate networks: Developer Quickstart\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments. It serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. \n\nLearn more about Hyperledger projects: \nhttps://www.hyperledger.org/use\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
