[item]
description = "In order to comply with the industry regulation, every company has its own due diligence process to assess supplier risks. To complete the due diligence process a supplier needs to answer an extensive set of questionnaires in different risk areas such as Labor Rights or Health Safety. There is an 80% of overlap between on-boarding questionnaires of companies from the same industry. Questionnaires are not standardized and onboarding data is not mappable between different companies. Finally, the due diligence results are not shared among other companies, increasing their internal costs.\nIn this webinar, a Hyperledger Member Company - Swisscom - will present the SSIGate. SSIGate is a solution implementing Self-Sovereign Identity (SSI) standards and data model in a fully managed way. It can be integrated into any software solution to unleash the SSI capabilities. With SSIGate, a Supplier can easily apply to another company without going through the similar long onboarding procedure. Company B can validate the outcome of the process already done by Company A for each risk area and eventually apply a "lightweight" onboarding procedure.\nLuigi will present a demo and will talk in-depth about the lessons learned and challenges he faced.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
