description = "Join this design thinking session lead by Hyperledger Premier Member, ConsenSys, to ask your Ethereum questions to experts in the field who spend their time building and using Ethereum everyday. The Ethereum leaders will discuss:\n\nProvide a brief introduction of Ethereum\nAnswer your questions about Ethereum\nExplain how Ethereum is already in use in Hyperledger\nWhat to expect if you participate in this session:\n\nHighly collaborative and interactive sessions with leaders in Ethereum and Hyperledger communities\nLearn best practices and technical insights into Hyperledger’s Ethereum projects\n“An hour or so, to learn….” is a series, in which Hyperledger members share learnings from their projects and try to answer all the hard questions about the pains of working with DLTs. It is not yet another webinar: participants will be encouraged to take part, come with prepared questions and opinions. Expect live demos and tutorials, stories from the battle field and hopefully some heated discussions. Let’s get out of the zoom fatigue and engage to share experiences and build a stronger community.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
category = "Education"
title = "Hyperledger In-depth: An hour with Ethereum - Ethereum for the Hyperledger Community."
