title = "Exploring the Path of Legitimate NFTs in China - Yifan He, Red Date Technology"
description = "Exploring the Path of Legitimate NFTs in China - Yifan He, Red Date Technology\n\nYifan will introduce BSN and BSN Distributed Digital Certificate (BSN-DDC) Network. He will give an informative speech about the NFT market in China, and the future of the blockchain industry. “NFT/DDC technology is a digital certification and distributed database technology that can be applied in any scenario where digital proof is required. We anticipate billions of DDCs issued annually in China in the future. The biggest market for DDCs lies in certificate and account management for all types of businesses”, said Yifan He, CEO of Red Date Technology and Executive Director of BSN Development Association. In China, the BSN-DDC Network offers the most diverse, transparent, credible, sustainable, and reliable environment for DDC-related business platforms to mint and manage their DDCs. Unlike existing NFTs deployed on private chains controlled by one entity, or other available options in China, the BSN-DDC Network is a public infrastructure that employs a multi-party governance model to ensure the decentralization, transparency, and authenticity of the network. \n\nSessions Details & Slides (if available): https://sched.co/14H6t\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
