description = "Building the Global Economic Network for Web3 with Composable Applications - Alex Putkov, Digital Asset\n\nBuilding composable applications is a key requirement for any ecosystem to thrive and grow organically. This is true even more for financial applications that rely on blockchains providing services that are extensible without having to rewrite/redeploy systems and software infrastructure. In this presentation, we’ll talk about how domain specific programming language alongside privacy-enabled blockchains can be leveraged to build composable applications that can form the building blocks of the next generation of global economic network, where transactions and assets flow seamlessly across organizational and national boundaries. We’ll share examples of stock exchanges and financial services organizations such as Australian Stock Exchange (ASX), Hong Kong Stock Exchange (HKEX), and Goldman Sachs among others, who have successful projects that are leading towards this future. We’ll also focus on the issues of trust and privacy which is paramount to a successful adoption of any enterprise blockchain, where privacy and authorizations have to be built into the application and code base from day one. \n\nSessions Details & Slides (if available): https://sched.co/17CXa\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
