description = "A virtual meetup hosted by Hyperledger Toronto featuring a discussion about Climate Action and Accounting with Hyperledger.\n\n\nClimate change may well be the biggest challenge of our time. Even though we have the technology to reduce our emissions to zero, and citizens, businesses, and investors around the world are ready to act, coordinating climate action remains a large and complex organizational challenge. In this presentation, Si Chen will discuss how the Hyperledger Climate Action and Accounting SIG is looking at blockchain/DLT's as the solution:\n\nHow are organizations around the world coordinating climate action?\nWhat is carbon emissions accounting and its role in climate action?\nWhat are the standards for carbon offsets and emissions trading?\nWhen is blockchain/DLT potentially the right solution?\nWhat is the Hyperledger Climate Action and Accounting SIG doing on carbon emissions and climate change?\nDemonstration and discussion of code and development.\nUpcoming projects and collaboration opportunities.\n\nWhether you're interested in climate change or just where the opportunities are for blockchain/DLT's, we hope you'll find this an interesting session.\n\nSpeaker bio:\nSi Chen found out about open source software while starting a small ecommerce business in 1999. He realized that its low cost and flexibility made a world of difference and started Open Source Strategies, Inc. to develop and promote the development of open source software for business applications. He has been a committer of the Apache OFBIZ project and lead developer of the opentaps Open Source ERP and CRM system. As a former hedge fund manager, he's always been fascinated about the failure of markets to address climate change. He's now using blockchain/distributed ledger technologies to solve the climate problem as part of the Hyperledger Climate Action and Accounting SIG.\n\nMore about the event is at: https://www.meetup.com/Hyperledger-Toronto/events/274129711/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerMeetups #Blockchain"
