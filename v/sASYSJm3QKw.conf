title = "Getting hands on Perun State Channels (Hyperledger Lab)"
description = "A recording of a virtual meetup hosted by the Hyperledger India Chapter on May 29, 2021 about the Perun lab.\n\nPerun framework is a layer 2 scaling solution for blockchain. It is jointly developed as a Hyperledger Labs project by the “Economy of Things” strategic advance engineering project at Bosch Research and by PolyCrypt GmbH. Designed to be blockchain agnostic, it can be used on top of any blockchain platform to accelerate decentralized applications and lower transaction fees. It specifically targets high-frequency and low-value transactions.\n\nIn this talk, the speakers will present a brief overview of the Perun framework focusing on how it enables the use of blockchain in IoT devices with limited resources and network constraints. It also includes a demo followed by a hands-on tutorial describing how you can try out the framework and integrate it into your projects. In the end, there will also be an AMA.\n\nMore about the Perun lab is at: https://github.com/hyperledger-labs/go-perun\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerMeetups #Blockchain"
