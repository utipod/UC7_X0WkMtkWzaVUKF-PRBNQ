description = "After Production: Prepare the Software Factory for Blockchain Maintenance - Marco Alarcon & Jaime Pradenas, Bolsa de Santiago \n\nYour Fabric project went live and is now on Production. After the celebration, it comes the not so exciting long term maintenance related to any IT system. At the Santiago Stock Exchange, we underwent a process of knowledge transfer from the R&D team toward the Software Factory to keep the Exchange Blockchain network running and evolving, with unforseen challenges that arise from the use of Blockchain technology. At the same time, the R&D team took the effort to plan the evolution of the Fabric network, with an aim to create a Blockchain Consortium and an explandable platform. This session expose how to plan your blockchain architecture for the future and what are the core activities required to keep your Blockchain network running in the long term, when at the same time it evolves with the incorporations of new business cases, requirements and participants. This sessions ends with the current plan of the Santiago Stock Exchange regarding the next Blockchain platform that is under development.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
