description = "These presentations were part of the virtual session track for the Blockchain TechFest 2022 hosted by the Hyperledger India Chapter.\n\nCBDC: Buzz or a future of finance by Dhananjay Patil\n\nDhananjay is a Blockchain enthusiast at HCL with 14+ years of diverse experience in IT projects delivery.  He has professional experience in various streams including SAP Functional consultant for Utilities, Automobile, Technology industry.\n\n    In addition he has experienced as\n    - AGILE coach\n    - Product owner\n    - AI/ML and predictive analysis applications in Supply Chain\n    - Blockchain enthusiast\n    \nDebugging Hyperledger Fabric Chaincode - Ashwath Govindan\n\nAshwath is the Co-founder of Spydra Technologies where are building products and services to provide Decentralization as a Service for businesses. He is a graduate from IIT Varanasi and has worked extensively in the field of Blockchain, Security and Identity. He has worked at Microsoft for 16+ years where he has built large scale security and identity management solutions for various prominent organizations around the globe. Since the last 4+ years, he has been focused on blockchain technologies and on expanding its usage in the enterprise space.\n\n3. The Business of Smart Contracts - Smriti Chaudhry\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
