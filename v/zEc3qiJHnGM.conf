description = "Extending the Operations Smart Contract for Hyperledger Fabric to Support Consortia Governance - Todd Little, Oracle\n\nAs consortium blockchains move to decentralized governance, the complexity and cost of operations rise significantly for adding members, updating chaincodes, channel management. These require policy definitions, multi-party approvals, implementation - plus the ability to audit it all. Today it's all out-of-band, but on-chain automation can simplify network scale out & reduce costs. The Operations Smart Contract (OpsSC) for Fabric 2.x is a Hyperledger Labs project for on-chain governance focused on the Fabric 2.0 chaincode lifecycle and channel configs. It enables the chaincode updates to be agreed and recorded in the ledger, but it doesn’t handle membership governance - who can be added, what rights do they have, their information sharing, and overall policy management is missing. This session will discuss ideas for extending the OpsSC to address these issues of consortia governance. \n\nTo learn more about Hyperledger, the open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments. Which serves as a neutral home for various distributed ledger frameworks including Hyperledger Fabric, Sawtooth, Indy, as well as tools like Hyperledger Caliper and libraries like Hyperledger Ursa click here: https://www.hyperledger.org/\n\nSession Details & Slides (if available)- https://sched.co/j3ep\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, 