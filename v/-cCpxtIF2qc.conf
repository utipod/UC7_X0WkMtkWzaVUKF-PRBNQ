description = "Transparency, Security and Auditability of Critical Reporting Chains with Blockchain - Nikolaos Saklampanakis & Ece Kubilay, Fujitsu\n\nE. Kubilay and N. Saklampanakis will present a joint project of Fujitsu and Hexagon that brings together IoT, AI , security monitoring and HL-Fabric for handling critical security events. Handling security incidents, results in reporting chains: The creation of an alarm, the context, the handling it receives, and finally the auditing process, are all rings of such a reporting chain. Critical security incidents might result increased monetary costs or even lead to life-threatening situations if not handled optimally. It is thus of utmost importance to ensure that the event is handled with the highest possible standards, and that the reporting chain depicts the truth in a transparent auditable manner. And these are exactly the challenges we address with Hyperledger Fabric. Join our session to get insights and lessons learned from building this project and enjoy a live demo.\n\nSessions Details & Slides (if available)- https://sched.co/j3bF\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
