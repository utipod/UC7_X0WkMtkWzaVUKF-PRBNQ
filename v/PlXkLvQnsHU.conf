description = "Sustainable Supply Chain Tracking for Volvo Cars’ Electric Vehicle Batteries on Hyperledger Fabric Blockchain - Douglas Johnson-Poensgen, Circulor & Mark Rakhmilevich, Oracle \n\nIn this session hear from Circulor and Oracle about the project to track cobalt supplies used in EV batteries.With Volvo’s plan to switch 50% of their car production to EVs by 2025 and 10-20kg of cobalt required per car battery, both mining and recycling sources of cobalt are critical to their success.Circulor had developed a tracking solution on Oracle Blockchain Platform that integrates identity, GPS, yield, and mass-balance calculations to ensure that only safe and sustainable sources of cobalt make it through the extensive supply chain involving the largest battery suppliers in the world, their recycling ecosystem, logistics vendors, and Volvo cars manufacturing facilities.Learn the real challenges in implementing complex blockchain tracking solutions across multiple materials transformation phases and how Circulor and Oracle provided Volvo Cars a solution to scale this for 1M cars.Hear from the Circulor and Oracle experts who are enabling this digital supply chain transformation at Volvo Cars.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
