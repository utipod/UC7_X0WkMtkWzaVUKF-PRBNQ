description = "Building Identity and Credit Solutions for the Developing World Using Hyperledger Technology - Alan Krassowski, Kiva \n\nIn this session, Mr. Krassowski will provide a technical overview of the solutions Kiva has been putting in place in the developing world that provide better access to identity and credit for traditionally underserved communities.He will walk through fundamental design decisions Kiva has made relative to its project requirements and how the Kiva team chose among Hyperledger technologies including Indy, Aries, Ursa, Fabric, and Besu.The system-level architecture will be reviewed, and the audience will gain a perspective on how the solution has achieved interoperability among various Hyperledger technologies and also with parts of the existing banking infrastructure in at least one implementation country.Engineering trade-offs and design decisions will be discussed, as well as the roadmap for continued development and expansion of the system, giving the audience a holistic view of how Kiva is leveraging Hyperledger technologies for human betterment.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
