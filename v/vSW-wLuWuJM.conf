description = "Saudi Aramco, Procure to Pay Eco-System - Ali Safri, Avanza Innovations & Abdullah M Askari, Saudi Aramco\n\nAs the largest Oil & Gas and the most profitable company in the world, Saudi Aramco has complex procurement & payment processes. Contracting, delivery & payment processes with hundreds of suppliers across thousands of services & orders is tedious and entangled with heaps of documentary proofs, verification reports, third party evaluations & a barrage of internal checks & controls. Despite investing in some of the best ERP technologies, Saudi Aramco & it’s suppliers face a multitude of challenges, delays & even disputes in procurement & payment cycles. Avanza helped Aramco address these age-old challenges, discrepancies & in-efficiencies by developing a HLF Based Procure to Pay platform. Deployed on IBM’s IBP, the Platform helps streamline & automate entire delivery related documentation & verifications in real time, thereby bringing huge efficiencies to the overall invoice verification & payment processes. Tightly coupled with complex contract terms, platform is a self-regulating network that enables Aramco’s suppliers & internal departments to agree on all aspects of services, goods delivered & associated payments. Platform was launched in Aug 21 & is rolled out to 13 suppliers. \n\nSessions Details & Slides (if available): https://sched.co/14H4Z\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
