description = "Autonomous Risk Management of DeFi - Vipin Bharathan, dlt.nyc\n\nDeFi has seen rapid development. With this rapid development comes reports of spectacular heists, scams and hacks. Rapid development and great returns come with risks. Without risk, there is no reward. The broader financial system has been dealing with this phenomenon for centuries, mostly through the practice of Risk Management.\n\nThis talk answers the question "Can such Risk management practices be adopted to DeFi?" Our answer is yes. We propose a framework and suggestions for a solution fusing familiar risk management proposals.\n\nThese include ways to deal with the vast amount of data, Value at Risk Methods (including governance risk), trading risk methods integrated and extended to the DeFi world through automated risk monitoring and mitigation. The surfacing of these risks and integration into trading systems on the edge (aka wallets) with a transparent scoring mechanism will result in wider acceptance of DeFi.\nDrawing parallels with structures in Finance; the hacks that have happened, ideas for infrastructure, automation of scoring, division between the edge and the core and integration of such techniques into the trading and risk management of Web3:Yield Farms, DEXes, NTFs ... \n\nSessions Details & Slides (if available): https://sched.co/1AySO\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
