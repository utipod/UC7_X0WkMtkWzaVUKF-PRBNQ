description = "Over the last five years, we’ve seen a swirl of blockchain activity, with peaks of buzz, troughs of disillusionment and, in between, real progress on enterprise adoption. But, by most accounts, we are just starting to see the potential of blockchain for business. So what comes next? In this panel, we’ve gathered leaders from technology, academia and finance to debate what comes next. Topics will include:\n\n- Blockchain’s role in tackling the biggest challenges ahead, including Climate Change, health credentials, financial inclusion, digital identity, fake news and more\n\n- Network trends: public vs private; cross chain transactions; multiparty systems and blockchain’s place in the stack; consortia, standards and governance\n\n- Technologies and start-ups to watch\n\n- Thoughts on what might a fully blockchain-enabled future look like\n\nBrian Behlendorf, Executive Director, Hyperledger\nMichael J. Casey, Chief Content Officer, CoinDesk\nSandra Ro, CEO, GBBC\nEmiliano Vernini, Head of ICT Innovation Strategy, Poste Italiane\nAlissa Worley, Global Marketing Director - Blockchain, Accenture\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
