description = "Governing DLT Networks - David Treat, Accenture & Rob Palatnick, DTCC \n\nAccenture and DTCC have co-authored a paper, Governing DLT Networks, and we would like to jointly conduct a presentation with David Treat, MD, Global Blockchain Lead at Accenture and member of the Hyperledger Board and Rob Palatnick, CTO of DTCC and Chair of the Hyperledger Board. In it we propose a governance operating model to address approaches to managing the activity, connectivity, software changes, contractual agreements and transaction finality for every participant across the network.\nOur proposed DLT governance model is composed of eight high-level functional areas:\nGovernance, Participant Lifecycle, Runtime Operations, Data Governance, Third-Party Management, Platform Management, Infrastructure and Legal and Finance.\n\nThe paper marked the beginning of an important dialogue that we would like to continue driving across the ecosystem to determine how to leverage new technologies to drive DLT forward and benefit of the global blockchain ecosystem. Link to paper: https://www.accenture.com/us-en/insights/blockchain/dlt-governance\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
