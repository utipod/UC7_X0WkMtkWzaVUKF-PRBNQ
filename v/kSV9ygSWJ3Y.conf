title = "Smart Cycling - Blockchain in the Public Sector"
description = "Thomas Bohner, IntellectEU & Ruben Gevaert, Belfius\n\nIntellectEU, Belfius, and the city of Bonheiden have joined forces to create a SmartCycling Application. The goal was to motivate pupils to go to school on foot or by bicycle. Via an Internet-of-Things chip the municipality collects data on the number of bike rides, the kilometers traveled, fuel savings, avoided CO2 emissions, calories burned, and so on.\n\nThe children receive digital tokens they can use to pay at the village fair or at the local merchant. The more kilometers they cover, the more "ducaten" (tokens) they receive. These tokens are tracked on a distributed ledger network: Hyperledger Fabric.\n\nRuben and Thomas will explain the complexity and challenges to create a local currency, define the business and legal challenges and demonstrate the live application. SmartCycling is in production since September 2018 and will be rolled out in more Belgian cities.\n\nhttps://hgf18.sched.com/event/G8rP/smart-cycling-blockchain-in-the-public-sector-thomas-bohner-intellecteu-ruben-gevaert-belfius\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2018 #Blockchain"
