description = "Blockchain Infrastructure in China: How Blockchain Facilitates the Industrial Internet and Further Achieves the Internet of Everything - Jian Jin, China Academy of Information and Communications Technology\n\nChina is under a tremendous development explosion in blockchain industry. With the massive support from the government, blockchain is built as an infrastructure in this digital era, merging with other cutting-edge technologies, such as the industrial internet, to better extend its full potential and spread benefit to the world. Doctor JIN Jian, director of Institute of Industrial Internet and IoT (IIIIoT) from China Academy of Information and Communications Technology (CAICT), secretary general of Alliance of Blockchain Industry Z-Park (ABI), will deliver a speech about the latest progress of China’s blockchain industry, the use of Hyperledger framework in China, the integration between industrial internet and blockchain, introduce an innovated national blockchain infrastructure: Blockchain Infrastructure Facility (BIF), and also talk about the cooperation between Hyperledger and ABI.\n\nSessions Details & Slides (if available)- https://sched.co/j3bp\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: