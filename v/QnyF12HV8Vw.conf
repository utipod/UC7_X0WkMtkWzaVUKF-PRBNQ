title = "Beyond Consensus in Permissioned Ledgers - Alysson Bessani, University of Lisbon"
description = "Permissioned ledgers such as Fabric employ consensus to avoid central points of failures without endangering the blockchain consistency. Much attention has been given to consensus algorithms, their scalability, performance, and fault model (crash or Byzantine). However, much less attention has been paid to auxiliary protocols such as state transfer and reconfiguration, that any consensus "engine" must also support.\n\nIn this talk, I'll discuss some essential performance and scalability aspects of some well-known crash and Byzantine fault-tolerant consensus protocols such as Raft and PBFT, illustrate some limitations of these protocols when recovering crashed nodes and reconfiguring the group, and show how to cope with these limitations.\n\nThe last part of the talk will report the experience of my team on the design and implementation of the first Byzantine fault-tolerant orderer service for Fabric 1.1, showing how the issues above affected our system and pointing some features that should be considered if this project wants to avoid them. Finally, I'll finish the presentation with some suggestions for making Fabric more friendly to new ordering service implementations.\n\nhttps://hgf18.sched.com/event/JKT1/beyond-consensus-in-permissioned-ledgers-alysson-bessani-university-of-lisbon\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2018 #Blockchain"
