title = "Teaching Blockchain to University Students and Professionals"
description = "Approach, Experiences and Reflections - Imre Kocsis, Budapest University of Technology and Economics\n\nDuring the last year, our research group began to gather experience in blockchain education. We concluded our first university blockchain course in “Blockchain technologies and applications” (with 200+ students and numerous alumni), ran multiple industrial courses and successfully applied for online course development at a major European industrial consortium.\n\nThe talk discusses our approach towards Blockchain education that emphasizes distributed ledger and integration platform aspects, in a technologically balanced way - the introduced platforms range from Hyperledger Fabric/Composer to Ethereum. The course presents in-depth the different alternate distributed ledger solutions and principles in the Hyperledger project; an important aspect is the overview of the entire blockchain development lifecycle, covering the Hyperledger ecosystem and the application know-how of its individual elements. We provide a broad overview of application patterns, from middleware through cooperation to tokenization.\n\nThe talk is an overview of the didactic strategy, complemented by the experiences based on the feedback from our audiences and practical problems solved by them.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2018 #Blockchain"
