title = "Carbon Accounting and Certification Working Group"
description = "The mission of the Carbon Accounting and Certification Working Group is to identify how blockchain or distributed ledger technologies (DLT's) could improve corporate or personal carbon accounting; make carbon accounting and certifications more open, transparent, and credible; and build collaboration between consumers, businesses, investors, and offset developers across industries and national boundaries.\n\nPeople in the group are building a set of open source tools for an “operating system for climate action” in their blockchain-carbon-accounting lab.  The code is being developed as an open source project and you're invited to get involved with what the group is building.  Learn more about how to get involved at:\n\nhttps://wiki.hyperledger.org/display/CASIG/Carbon+Accounting+and+Certification+WG\n\nThis Working Group is part of Hyperledger's Climate Action and Accounting Special Interest Group and you can find out more about that at: \n\nhttps://wiki.hyperledger.org/display/CASIG/\n\nAnd please feel free to join the group's discussion list and introduce yourself: \n\nhttps://lists.hyperledger.org/g/climate-sig\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
