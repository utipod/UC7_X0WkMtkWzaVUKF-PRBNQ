description = "This is the first video of a six-video series about FireFly, giving an overview of the four main pieces of a FireFly Node:\n\nCore:\n-Active engine which your apps use to interface with the system\n-Maintains private data storage\n-Manages the lifecycle of assets and data, and dispatch actions and processes events. \n\nConnectors:\n-Abstract away the complexity of reliable, \n-coordinated flows across heterogeneous runtimes. \n\nRegistry:\n- Maintains the identity and connectivity info of the network members.\n\nInfrastructure Runtimes:\n- Pluggable implementations of multi-party collaboration across transactions, data, and messages.\n- Many compute types (blockchain, low code, TEE, zkp, etc.)\n\nLearn how these pieces fit together and why this architecture is important.\n\nWhat is FireFly?\nFireFly is a Hyperledger Lab that provides a multi-party system for enterprise data flows, powered by blockchain. It solves the layers of complexity that sit between the low-level blockchain and high-level business processes and user interfaces. FireFly enables developers to build blockchain apps for enterprises radically faster by allowing them to focus on business logic instead of infrastructure. \n\nLearn more about FireFly at Hyperledger Labs: https://wiki.hyperledger.org/display/labs/Firefly\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
