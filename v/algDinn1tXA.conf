description = "Consortium Capabilities for Enterprise Blockchain Success - Dr. Stanton Heister & Dr. Kristi Yuthas, Portland State University\n\nEnterprise blockchain projects have great promise. They can cut costs and promote efficiency through disintermediation, increase transparency for tracking inter-company transactions, expand knowledge through consortia databases, and improve work-flows through shared business processes. Despite its potential, blockchain technology has failed to produce promised benefits for enterprise networks. While the underlying technology has advanced rapidly, managerial capabilities needed to form and manage blockchain consortia have lagged, and few consortia have succeeded. We provide a framework that identifies 1) foundational conditions that precede effective consortium formation, 1) capabilities required for effective consortium functioning and evolution, and 3) partner and ecosystem-level outcomes associated with successful blockchain projects. \n\nTo learn more about Hyperledger, the open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments. Which serves as a neutral home for various distributed ledger frameworks including Hyperledger Fabric, Sawtooth, Indy, as well as tools like Hyperledger Caliper and libraries like Hyperledger Ursa click here: https://www.hyperledger.org/\n\nSession Details & Slides (if available)- https://sched.co/j3f4\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger 