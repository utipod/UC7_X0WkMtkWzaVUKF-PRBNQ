title = "Creating a Retail CBDC Prototype With Hyperledger Fabric - Imre Kocsis, Budapest University of Tech"
description = "Creating a Retail CBDC Prototype With Hyperledger Fabric - Imre Kocsis, Budapest University of Technology and Economics\n\nWhile the debate about CBDCs has been going on for years now, there are very few publicly accessible implementations. This was even more true in 2021, when in a research cooperation with the Hungarian National Bank (MNB), a team at the Budapest University of Technology and Economics (BME) set out to create one - as a prerequisite for researching the future applications of CBDCs in smart contract ecosystems. Join for this talk Imre Kocsis, a lead expert of the team who created this hybrid CBDC prototype, who gives a tour of the design goals, design decisions and the implementation. The technical highlights include an Ethereum-style pseudonymous CBDC ledger over Hyperledger Fabric; financial institutions acting as CBDC minters (by conversion) and end-user transaction relays; and financial institution based "bridging out" of a CBDC to a permissioned Ethereum network, using Hyperledger Cactus. Performance figures are also provided. Maybe even more importantly than a proof-of-feasibility for a Fabric-based retail CBDC, many open questions became apparent; e.g., the regulatory compliance of private blockchains "trusted" with CBDCs. An overview of these challenges will be also given. \n\nSessions Details & Slides (if available): https://sched.co/14H67\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
