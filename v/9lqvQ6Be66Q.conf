title = "Design Patterns to Practically Scale Blockchain Networks- Deepika Karanji & Arun S M, Walmart Global"
description = "Design Patterns to Practically Scale Blockchain Networks - Deepika Karanji & Arun S M, Walmart Global Tech India\n\nBlockchain technology has gained mass attention but mass adoption is still a distant future because it is yet to address scalability and user experience issues. The 3 pillars of blockchain - Security, Decentralization and Scalability seem to constantly strive to co-exist but struggle to live in harmony. Scalability and Decentralization are often held back by security, security tends to be compromised by any shifts on a network that offer scalability. Some platforms claim a higher transaction throughput, but compromise on decentralization. Finding a balance between the three is difficult and presents a problem referred to as the Blockchain Trilemma. Few projects propose developing their own blockchains, neglecting the massive developer community and ecosystem that already exists. If there is going to be any sort of mass adoption, scalability is critical. Lately, there have been solutions in Layer 2 space that use innovative and practical design patterns to tackle the trilemma. Popular design patterns like state channels, side chains, optimistic rollups and zero-knowledge rollups have been proven to improve transaction speeds without compromising on security and decentralization. \n\nSessions Details & Slides (if available): https://sched.co/14H6k\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
