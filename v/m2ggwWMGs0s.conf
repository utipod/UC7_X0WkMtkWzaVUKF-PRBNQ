[item]
description = "Sudheesh Singanamalla, Microsoft Research\n\nThe talk speaks about a personal journey while using Hyperledger Fabric and Iroha to build a blockchain powered philanthropy platform. The development of such a system has been definitely challenging for a variety of reasons. This talk aims to dive deep into the technology challenges that arise for developers working with the choice of ledgers under the hyperledger umbrella. This talk aims to focus on the usability challenges that still surround Hyperledger projects from a developers' perspective (development, deployments and scaling) in addition to the research challenges. These challenges turned Sudheesh into a contributor to the hyperledger project aiming to improve hyperledger usability. Finally, the talk proposes a few steps ahead to be taken collectively as a community like improving developer resources, add best practices and increase focus on building secure blockchain solutions.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2018 #Blockchain"
category = "People & Blogs"
title = "Wrangling Hyperledger: Usability Lessons Learnt the Hard Way & Proposal For Steps Ahead"
