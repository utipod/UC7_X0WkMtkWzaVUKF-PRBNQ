title = "Toward Fully-Decentralized System With Hyperledger Fabric... - Tatsya Sato"
description = "Toward Fully-Decentralized System With Hyperledger Fabric - Requirement Analysis of Decentralized System Configuration/Operations and Potential Use of a Decentralized Operations Tool “OpsSC” - Tatsuya Sato, Hitachi, Ltd.\n\nA system using Hyperledger Fabric (Hyperledger Fabric-based system) provides the value of executing transactions inter multiple organizations in a decentralized manner. To maximize this value, it is essential to maintain decentralization not only in the execution system but also in the entire system, including system configuration and management. On the other hand, Hyperledger Fabric is still in the process of maturing and full-decentralization is still difficult to achieve (e.g., ops with a single centralized script as a bad practice). The lack of clarity on how to achieve this may be a disincentive for production uses of Hyperledger Fabric. So, Tatsuya tries to analyze comprehensive basic requirements for realizing fully-decentralized Hyperledger Fabric-based systems and design a reference architecture to satisfy the requirements. In addition, he also lists various types of system management workflows (e.g., BC network ops) to which the requirements would potentially apply, and then demonstrates the applicability of "OpsSC" which is a decentralized system operation tool for Hyperledger Fabric and is registered as a Labs project (https://github.com/hyperledger-labs/fabric-opssc). \n\nSessions Details & Slides (if available): https://sched.co/14H4o\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
