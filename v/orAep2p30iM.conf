description = "Hyperledger Seattle Meetup: Comprehensive Review of Assets Tokenization in the Finance Industry w/Matt Zand\nhttps://www.meetup.com/Hyperledger-Seattle-Chapter/events/275136631/\nDetails\nIn this short webinar we explain what asset tokenization is and how it works. Specifically, we review concepts such as Initial Coin Offering and Security Token Offering while comparing them with IPO and venture capital funding. What is indeed new is the idea of tokenization applied to assets in conjunction with such application via a blockchain platform. When you have a technology platform that instills high data integrity and immutability combined with transparency and provenance, applying tokenization on top of such platform becomes a new and very powerful financial medium across many sectors.\n\nNo prior knowledge of blockchain or Hyperledger is required for attending this webinar.\n\nWebinar length\nLecture: 45 minutes\nQ/A: 15 minutes\n\nWebinar topics\nFor a detailed list of topics covered in this webinar, visit the below page:\nhttps://coding-bootcamps.com/webinars/asset-tokenization-with-blockchain.html\n\nWebinar doc\nhttp://myhsts.org/docs/webinars/asset-tokenization-with-blockchain.pdf\n\nAbout Presenter\nMatt Zand is a serial entrepreneur and the founder of 3 tech startups: DC Web Makers, Coding Bootcamps and High School Technology Services. He is a leading author of Hands-on Smart Contract Development with Hyperledger Fabric book by O’Reilly Media. He has written more than 100 technical articles and tutorials on blockchain development for Hyperledger, Ethereum and Corda R3 platforms. At DC Web Makers, he leads a team of blockchain experts for consulting and deploying enterprise decentralized applications. As chief architect, he has designed and developed blockchain courses and training programs for Coding Bootcamps. He has a master's degree in business management from the University of Maryland. Prior to blockchain development and consulting, he worked as senior web and mobile App developer and consultant, angel investor, business advisor for a few startup companies.\n\nYou can connect with him on LI: https://www.linkedin.com/in/matt-zand-64047871\n\nResources\nReading the following articles is highly recommended:\n1- Comprehensive guide for all Hyperledger developers = https://myhsts.org/tutorial-comprehensive-blockchain-hyperledger-developer-guide-for-all-professional-programmers.php\n\n2- Comprehensive overview and analysis of blockchain use cases in many industries= https://blockchain.dcwebmakers.com/blog/comprehensive-overview-and-analysis-of-blockchain-use-cases-in-many-industries.html\n\n3- Blockchain decentralized App use case for healthcare data sharing= https://blockchain.dcwebmakers.com/blog/decentralized-app-use-case-for-healthcare-data-sharing.html\n\n4- Why build blockchain applications with Hyperledger Fabric = https://learn.coding-bootcamps.com/blog/202224/why-build-blockchain-applications-with-hyperledger-fabric\n\n5- The power of blockchain in asset tokenization and fractional ownership management =\nhttps://blockchain.dcwebmakers.com/blog/blockchain-for-asset-tokenization-and-fractional-asset-ownership.html\n\n6- Comprehensive Review of Blockchain Security Token Offering under US Securities Laws =\nhttps://blockchain.dcwebmakers.com/blog/review-of-blockchain-security-token-offering-under-usa-securities-laws.html\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerMeetups #Blockchain"
