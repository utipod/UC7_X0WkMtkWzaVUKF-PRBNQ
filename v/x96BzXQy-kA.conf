title = "Business-Driven Blockchain Architecture for Private Capital Markets"
description = "Kiran Garimella & Oscar Jofre, KoreConX\n\nFinancial instruments in the global private capital markets have specialized regulatory and company law requirements. These requirements increase in complexity due to the number of jurisdictions in which private companies can issue tokens and conduct business as well as the exemptions under which they issue tokenized securities. Another critical requirement is that all relevant corporate actions and events must be handled rather than just the one-time event of issuance or the secondary trading that is relatively infrequent.\n\nThese business needs help to determine the technical architectural decisions, including decentralization, security, access rights, consensus, validations, finality (both technical and legal), on-chain/off-chain considerations, and lifecycle management of smart contracts.\n\nKiran and Oscar describe the conditions for creating a safe, secure, and fully compliant platform.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
