description = "2021 was another big year for our Hyperledger Special Interest Groups! We now have over 2,500 participants worldwide across different sector SIGs and are already seeing great collaboration across the SIGs as blockchain technology topics overlap.\n\nPlease watch this short video as we thank all our SIG Chairs and SIG participants for all your contributions in 2021. It has been an amazing year of knowledge sharing, market education and content and code contributions from our SIGs. It is through your work and contributions that our Hyperledger ecosystem continues to grow stronger and more diverse.  Thank you! ~Hyperledger Foundation Staff\n\nIf you participate in our SIG community, feel free to drop your comments here and mention some of the best sessions or content you saw in 2021!\n\nA very big thank you to our SIG chairs who do an amazing job at running all SIG activities:\nCapital Markets SIG - Chair: Vipin Bharathan Vice-Chair: Kirthi K.\nClimate Action & Accounting SIG - Co-Chairs: Sherwood Moore Robin Klemens\nHealthcare SIG - Chair: Mike McCoy\nMedia & Entertainment SIG - Chair: David MacFayden\nPubic Sector SIG - Chair: Jim Mason\nSocial Impact SIG- Chair: Nancy Min\nSupply Chain SIG - Chair: Tom Klein Vic-Chair: Erik Valiquette\nTelecom SIG- Chair: Vipin Rathi\nTrade Finance SIG- Chair: Andrea Frosinini Vice-Chair Atul Patel\n\nIf you want to catch up on some of the great 2021 SIG presentations and content, make sure to check out our youtube playlists. - https://lnkd.in/gDiwFrMf\n\nTo get involved with the SIGs start here: https://lnkd.in/gV7XrdR8\n\nAre you a member of our Hyperledger SIGs and want to show your support? Great! Check out these guidelines- https://lnkd.in/gFmM7CMi\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
category = "Education"
title = "Celebrating the work and contributions of our Hyperledger Special Interest Groups SIG in 2021"
