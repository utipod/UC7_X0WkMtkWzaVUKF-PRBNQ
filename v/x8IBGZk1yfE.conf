title = "Blockchain, Biometrics and Geo Location: the Implementation... - Dino Dell’Accio & Shashank Rai"
description = "Blockchain, Biometrics and Geo Location: the Implementation of Innovative Technologies at the United Nations Joint Staff Pension Fund (UNJSPF) - Dino Cataldo Dell’Accio, UNJSPF & Shashank Rai, UNICC\n\nIn January 2021, in accordance with its digital transformation strategy, UNJSPF deployed a solution based on blockchain and biometrics to transform a legacy process with a global reach (70K beneficiaries located in more than 195 countries). The solution offers an alternative to paper-based processes. UNJSPF beneficiaries are required to sign and submit a ‘Certificate of Entitlement,’ or ‘CE,’ every year as a “proof of existence” and proof of country of residence, to continue receiving their benefits. With this ‘Digital CE solution,’ UNJSPF aims to create, verify and secure the digital identities of beneficiaries - while also preventing fraud – using biometrics; identifying their locations with geo-location technology; and storing transactions on an immutable, traceable and independently auditable ledger, using the Hyperledger Indy blockchain platform. The Digital CE solution addresses both technical or business audiences with focus on innovation and technology for social good. This solution was selected as a finalist in Gartner’s Eye on Innovation Awards for Government 2020. It was selected because it demonstrated how emerging technology can be combined to allow the service to be delivered in a completely different way, improving integrity and efficiency.\nSessions Details & Slides (if available)- https://sched.co/j3fz\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
