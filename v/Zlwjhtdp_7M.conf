[item]
description = "Today, Hyperledger Fabric networks are currently running in numerous countries. But 80% of the world’s population are non-English speakers. English-only Fabric documentation represents a barrier to adoption by the broader global community. What if the Fabric documentation was available in native languages to these non-English speakers? Blockchain networks could be deployed and shared more easily, as the pool of Fabric users broadens to non-English speaking developers around the world.\n\nWe want to invite you to help us make information and resources about Hyperledger available to people in your language.  To get involved with a translation, check out the existing translation groups or start your own.  And you're welcome to translate any of the material in the Hyperledger community that you would find useful to have in your own language.\n\nTo get started visit: http://www.hyperledger.org/translate\n\nTo find the existing international groups working on translations for Brazil Portuguese, Chinese, French, Japanese, Malayalam, Russian, Spanish and Tamil, visit: https://wiki.hyperledger.org/display/fabric/International+groups\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
