description = "Panel Discussion: From Technology to Business Proposition: Creating the Case for Decentralized Identity - Trevor Butterworth, Indicio; JP George, Trinsic; Kaliya Young, Identity Woman\n\nSpeakers: JP George, Trevor Butterworth\nA global pandemic, working from home, and numerous technical breakthroughs mean that decentralized digital identities are no longer discussion points; they’re pilots, they’re products, they’re solutions to the chronic problems of verification, privacy, and security online. In this discussion we’ll examine how “decentralized,” “reusable,” or “self-sovereign” identity is meeting the needs of consumers, companies, organizations, and the public sector around the world, how it is creating opportunities for new kinds of digital interactions and relationships, what what you can do to adopt and benefit from this new technology now. *description provided by Trevor Butterworth\nabout: Kaliya, widely known as the Identity Woman, is a top expert in decentralized / self-sovereign identity. She has committed her life to the development of an open standards based identity layer of the internet that empowers people. Kaliya co-founded the Internet Identity Workshop (IIW), which in the past 17 years has nurtured standards being used all over the internet, like OpenID Connect and OAuth. In January 2020 she was featured in Wired UK. \n\nSessions Details & Slides (if available): https://sched.co/19SDt\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
