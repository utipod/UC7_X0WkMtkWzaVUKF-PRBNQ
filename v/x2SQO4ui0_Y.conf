description = "Insight Into a Production-Ready Hyperledger Fabric Certificate Authority - Noah Elia Schär & Aaron Beer, PostFinance Inc.\n\nIn a private, permissioned blockchain, all participants must be identified. Hyperledger Fabric uses a Public Key Infrastructure (PKI) to manage these identities. For testing purposes, the Cryptogen tool can be used to initially create the crypto material. However, for a production network, its use is strongly discouraged. One important reason is that the entire lifecycle of the crypto material cannot be managed. Due to the limited documentation, the barrier to entry is high to build a production-ready PKI in Hyperledger Fabric. We at PostFinance TechLab have taken the leap and replaced Cryptogen with Hyperledger Fabric CA. In our presentation, we will explain the biggest differences and most importantly the benefits of Fabric CA. In addition, we will explain many of the lessons we learned during the trial & error implementation process with concrete examples and a demo. We break down the problem of moving to Fabric CA into individual steps and show how we built a state-of-the-art PKI that interoperates with the Hyperledger Fabric blockchain. We plan to make our learnings available for the official Hyperledger Fabric documentation. \n\nSessions Details & Slides (if available): https://sched.co/14H5v\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
