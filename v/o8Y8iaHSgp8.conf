description = "Hyperledger FireFly Overview: The SuperNode for Enterprise Web3 Apps - Steve Cerveny & Nicko Guyer\n\nIt’s no secret that building Web3 apps is hard. There are protocols to master, new constructs like tokens and smart contracts to understand, and then the challenge of integrating everything with existing systems, which may be the hardest part of all. That’s why our community created Hyperledger FireFly, the first open-source SuperNode: a complete stack for enterprises to build and scale secure Web3 applications. In this session, Kaleido CEO Steve Cerveny will explain why SuperNodes are critical to enterprise web3 adoption and explain how Hyperledger FireFly helps enterprises: -Accelerate Development – build Web3 apps faster with a rich stack of native Web3, B2B, and integration services -Automate Deployment – deploy and manage many apps on the FireFly platform from a single console -Run at Scale – Connect to the multi-chain and multi-protocol Web3 world on a scalable, cloud-native platform built as microservices on Kubernetes Hyperledger FireFly community lead Nicko Guyer also shared a live demo showing how easy it is to get up and running on FireFly.\n\nSessions Details & Slides (if available): https://sched.co/14H6G\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
