description = "Why Open Source for Financial Services, Digital Assets, & CBDCs\n\nHosted in partnership by the Hyperledger Foundation with the Filecoin Foundation and CNBC. \n\nThe financial services industry has awakened to the need of open source. Open source technologies are being leveraged more and more to underpin key infrastructure in both government and corporate systems. Here we bring experts in government–Central Bank, open source technology development and collaboration–Digital Dollar Project, Fintech Open Source, and Hyperledger Foundation–as well as market thought leader Accenture to share their views on why open source technology and collaboration is the key to accelerating progress on CBDC research, adoption in financial services and in government.\n\nSpeakers:\nJennifer B. Lassiter -  Executive Director of Digital Dollar Project\nGabriele Columbro - Executive Director, FINOS\nDavid Treat,  Senior Managing Director, Accenture and Hyperledger Foundation Governing Board \nMorten Bech, . Economist, Bank for International Settlement (BIS)\nModerator:\nKaren Ottoni, Director of Ecosystem, Hyperledger Foundation \n\nhttps://hub.fil.org/content/davos-agenda-db/915-am-hyperledger-programming-cbdc\n\nThe World Economic Forum Annual Meeting in Davos-Klosters is the foremost creative force for engaging the world’s top leaders in collaborative activities to shape the global, regional and industry agendas. In this regard, the Forum’s mission – improving the state of the world – guides the design and development of the Annual Meeting objectives.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
