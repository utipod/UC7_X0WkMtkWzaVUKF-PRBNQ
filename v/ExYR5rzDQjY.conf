description = "Verifying Transactions in a Hyperledger Fabric Ledger with Blockchain Verifier - Taku Shimosawa, Hitachi, Ltd.\n\nWhile blockchain provides immutable and trustful data store, enterprise systems often have additional requirements for reliability and auditing. Blockchain Verifier, a project in Hyperledger Labs, is a tool that verifies the basic integrity of blockchain ledgers and also provides a means to write checking logics particular to each blockchain application. The result can be used as evidences for auditing, for instance. Blockchain Verifier is available at https://github.com/hyperledger-labs/blockchain-verifier. This demo presents the capability of Blockchain Verifier to check Hyperledger Fabric ledgers, and how to write a program that performs additional checks to the transaction in the ledgers with some example applications. Taku welcomes any contributions and suggestions for improvement for Blockchain Verifier to be applied to other practical blockchain use cases.\nSessions Details & Slides (if available)- https://sched.co/j3bL\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
