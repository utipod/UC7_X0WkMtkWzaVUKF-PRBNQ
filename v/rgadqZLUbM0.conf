title = "From Public to Private Blockchain Networks:"
description = "Free Your Developers from Dealing with the Intricacies of Blockchain Networks with a Network Agnostic Broker \n\nSwetha Repakula & Nima Kaviani, IBM\n\nDeploying and developing smart contracts is a complicated task. A developer not only needs to understand and implement the logic of a contract but also know how to set up and integrate their nodes to a network. With configuration and management differing by network, the learning curve for a polyglot blockchain developers is quite steep.\n\nPaaS aim to hide the complexities of the IaaS and allow cloud application developers to focus solely on their application logic. We believe the same analogy can and should be applied to blockchain application developers.\n\nIn this talk, we will demonstrate how the Blockhead broker facilitates the process of developing DApps independent of the blockchain network used. In particular, we will demo the deployment of smart contracts across both a public blockchain network (i.e. the Ethereum network) and a private blockchain network (i.e. Hyperledger Fabric).\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2018 #Blockchain"
