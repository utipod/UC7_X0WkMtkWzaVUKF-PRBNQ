[item]
description = "A video from Prajit Datta, organizer of Hyperledger Sweden.\n\nBlockchain, a term that is widely used in today’s world has indeed succeeded to make its mark in various sectors. From helping technology to grow and be more secure to helping people to uplift each other at the grassroots level, Blockchain has not disappointed the world. This is exactly why we need to focus on the issues where Blockchain can not only be an added benefit to the technological world but also to mankind from an emotional and well-being perspective.\n\nHere is where gender inclusion and human empowerment come to play. Connecting millions of people to the basic information and their rights needs to be done in a simplified manner so as to strike the balance between what is right and what they are taught to be right. Prejudice in different societies has created biases that need to be broken and not be defined by gender roles. This can be in terms of job security, equal pay, or financial education. The gap needs to be bridged and the first step towards doing so is by accepting the fact that there is a problem. Blockchain definitely sees it and is a boon towards the right step.\n\nFeel free to contribute at Hyperledger by joining our Social Impact Special Interest Group (SIG):  \n\nhttps://wiki.hyperledger.org/display/SISIG/Social+Impact+SIG\n\nThe Social Impact SIG is primarily focused on serving as a platform for exchanging ideas and exploration of ways to use blockchain technology in the context of social good. The Social Impact SIG will work with the other groups and technical teams, especially in the areas of implementation. The SIG will focus on convening a broad ecosystem, leveraging the skills, capabilities, and perspectives of individuals from the developer community, the social and humanitarian space, enterprises, government and non-government entities, and beyond."
category = "Education"
title = "How Blockchain Solves Social Inequality?"
pubdate = Tue, 25 Jan 2022 00:00:00 -0000
