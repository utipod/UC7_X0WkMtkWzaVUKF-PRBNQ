description = "The Giving Chain - Hardik Gupta, Instaraise\n\nThe Giving Chain is a Social Impact project created by the Hyperledger Princeton Meetup. The Purpose of the project is to decentralize local charity giving by creating the Giving Chain and the R2D application. The application will use Hyperledger Firefly to create an asset to be donated. The R2D (Recipient to Donor) then notifies the participant in the giving chain that an asset has been created and is ready to be donated. The asset is then tracked till it is received by someone with a need. Hardik Gupta will give a presentation on The Giving Chain and How the project will affect the whole supply chain. The project is made using the Hyperledger Firefly, the presentation will also include the basics of Firefly and how one can use it. Hardik Gupta will also give a live demo of The Giving Chain, with the Social Impact the project has accomplished over the past 2 years. The Giving Chain is under development and when completed the platform will be available for disaster/charity giving to all global project managers.\n\nSessions Details & Slides (if available): https://sched.co/14H6q\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: 