description = "NFT (Non-Fungible Token) is one of the hottest topics in the blockchain world. The ERC-721 (Ethereum Request for Comments 721), is a Non-Fungible Token Standard that implements an API for tokens within Smart Contracts. It provides functionalities like to transfer tokens from one account to another, to get the current token balance of an account, to get the owner of a specific token and also the total supply of the token available on the network.This Hyperledger Meetup is a technical workshop, which will discuss an example of how to mint non-fungible tokens (NFTs) with Hyperledger Fabric while storing the associated data on IPFS. It is based on the token-erc-721 chaincode of fabric examples.\n\nMr. Terry Wan is the contributor and active member of Hyperledger Fabric TWG (Technical Working Group), and was invited to speak at Hyperledger Global Forum 2021, introducing the data security topic of “A Tentative Description of Thinking: Internal Audit in Security of a block chain in Banking Infrastructure”.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
