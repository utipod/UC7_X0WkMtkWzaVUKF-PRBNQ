description = "Fabric Private Chaincode - Enhancing Privacy in Hyperledger Fabric with Confidential Computing - Marcus Brandenburger, IBM Research - Zurich\n\nFabric Private Chaincode (FPC) is a security feature for Hyperledger Fabric that leverages modern Confidential Computing technology to protect the integrity and confidentiality of Smart Contracts and their data. In this presentation we will cover what Fabric Private Chaincode is and how it can be used to implement privacy-sensitive use cases for Hyperledger Fabric. The goal of this session is to educate developers with all necessary background to adopt FPC for their projects. In addition to existing C++ Chaincode support, we will highlight recent project updates, in particular, the new support for Go-Chaincode and the integration with the Fabric Smart Client. We begin with an introduction of FPC, explaining the basic FPC architecture, security properties, and hardware requirements. Moreover, we will cover the FPC Chaincode API, and the application integration using the FPC Client SDK. Additionally, we will demonstrate how the Fabric Smart Client framework can be used with FPC to develop and test complex privacy-sensitive applications. We conclude this session with a Q/A discussion. \n\nSessions Details & Slides (if available): https://sched.co/14H4x\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
