description = "Demo: Low-Code Development Tooling For FT & NFT Applications on Hyperledger Fabric - Mark Rakhmilevich & Gourav Sarkar, Oracle\n\nWithout native Fabric token support, developing an application with fungible and non-fungible tokens involves high complexity and requires specialized expertise to build the complete token life cycle with Hyperledger Fabric chaincodes. Using low-code Blockchain App Builder tool created by Oracle for its blockchain platform, this demo will show how developers, consultants and business users can rapidly create production-ready fungible and non-fungible token chaincodes with built-in security. The low code approach for token chaincodes simplifies development & maintenance and expedites the adoption of tokenization due to low development cost and faster time-to-market for any application release. You will see how this tool uses simple json or yaml templates to specify token anatomy, tailor token behaviors and related properties, add custom properties and methods if needed. We'll then show the auto-generation in TypeScript or Go of core methods required to support behaviors and properties, and additional wrapper functions for full token lifecycle for FTs and NFTs. The generated chaincodes can be deployed locally or to remote blockchain nodes and invoked through REST APIs. \n\nSessions Details & Slides (if available): https://sched.co/14H5j\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
