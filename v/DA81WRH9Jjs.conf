description = "An in-person event hosted by the Hyperledger India Chapter on December 17, 2022 featuring Nanjunda Pratap Palecanda and Saurav Raaj.\n\nNanjunda Pratap Palecanda - Tokenization\n\nNanju is an entrepreneur, a Distributed economy Coach and a Startup ecosystem influencer. He is an alumnus of Bangalore University and IIM, Bangalore. He has been an Entrepreneur across the Internet (Media)/ E-Com, Retail tech, Analytics, HR and HealthTech. He has had an early success of Positive Exits and a few BIG falls. He has a decent experience in raising funding for ventures where he has collaborated and has been instrumental in getting funding for Ventures have collaborated with. He believes Web 3.0 is a great tool for adoption of Distributed economy across every sector and industry. Towards that, he’s been driving Tokenisation of Businesses and primarily building Securitisation of instruments to ensure dependable adoption of Crypto currency. He has invested in Media and Entertainment StartUp, BlockChain Technologies venture, F&B in social impact, Vernacular Media and a Fashion Venture with Social impact. He continues to engage with Entrepreneurs across various Products and Services space in multiple capacities, as Mentor, Collaborator, Coach, Advisor and Consultant. He has been very actively involved in organising Hackathons (with IISC) to develop new Technology Solutions in the Medical device space, which are further lead towards becoming sustainable Ventures.\n\nSaurav Raaj - Build Trust for a Decentralized World\n\nSaurav is Founder of Wize - a Tokenization as a Service Solution for business applications. He is an alumnus of IIT Delhi, and has completed  Management Development Program from IIM Lucknow. He is also 1st rank holder in the Financial Technology Professional Program from SP Jain Global Management Institute. He is active in Web3, DeFi and NFTs with experience on building on Hyperledger, Ethereum chains, Polygon, Metis, Celo, Ripple and Stellar and has won several awards at various local and international events. He also conducts regular sessions on blockchain technology related topics, to help knowledge sharing and adoption by business and enterprise users and creators.\n\nPhotos from the event are at: https://wiki.hyperledger.org/display/HIRC/Blockchain+TechFest+2022+-+Bangalore\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
