description = "Combining Chocolate and Peanut Butter at the Linux Foundation - Dan Middleton, Intel \n\nHyperledger and the Confidential Compute Consortium are two Linux Foundation projects providing unique enterprise computing models. At the intersection of these two projects is Avalon. Avalon makes the trusted execution capabilities of CCC usable in the distributed ledger frameworks provided by Hyperledger. Beyond deployment in HL frameworks Avalon also provides ease of composition in other B2B and distributed applications.\n\nIn this talk we will discuss how these open source efforts intersect and some of the impacts of that intersection emerging in cloud service provider capabilities. Technology leaders will benefit from learning about Avalon’s building blocks and lessons learned from some of the first commercial adoptions. Developers will learn about the application design model and cloud friendly container patterns for rapid prototyping. We will tie these topics and audiences together by walking through at least one end to end usage. This usage will demonstrate how to process confidential information between parties both attached to and disconnected from Fabric and Besu networks.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
