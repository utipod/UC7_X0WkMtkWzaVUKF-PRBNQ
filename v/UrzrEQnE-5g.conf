description = "UAE Trade Connect - UAE's First and Largest Blockchain based Trade Finance Platform - Waqas Mirza, Avanza Innovations\n\nBanks offer various Trade Finance solutions to their clients under Letters of Credit or Open Account using products and solutions like, Trust Receipt Financing, Invoice Discounting, Factoring, Receivable Finance and Supply Chain Finance. The challenges that banks face is the risk of potential double financing and frauds as there is no robust mechanism in place to validate the genuineness of the underlying trade transactions or whether the transaction has been pre-financed through any other bank. These risks have evolved leaving the banks to grapple with severe Financial Crime Risks like, over and under invoicing, Sanctions, Trade Based Money Laundering, resulting in fraud losses to banks and reduced financing to Corporates and SMEs. Developed on Hyperledger Fabric, UAE Trade Connect (UTC) is a State of The Art National Platform for digitizing and securing Trade.\nSessions Details & Slides (if available)-https://sched.co/j3bg\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
