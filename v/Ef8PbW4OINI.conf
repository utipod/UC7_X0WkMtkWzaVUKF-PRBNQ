description = "Automating Government Policy Loan Process Based on Hyperledger Fabric: Reducing Cost and Improving Customer Experience - Kyusang Lee, Samsung SDS & Do Hyung Kim, Shinhan Bank\n\nSpeakers: Kyusang Lee, Do Hyung Kim\nA policy loan is a type of government loan that funds small businesses through commercial banks by compiling government and related institutions' budgets. Despite the purpose, the disparate loan process between organizations causes heavy workloads. Customers also face the inconvenience of visiting the organizations several times for the application. Samsung SDS and Shinhan Bank developed a loan management platform based on Hyperledger Fabric to provide practical benefits for both organizations and clients. By automating the process, Shinhan Bank can reduce 12,000 working hours per year, and clients also expect shorter loan application time without visiting institutions. The platform also eliminates the risk of a data discrepancy. This session describes the business process and why blockchain is applied. It also discusses tangible benefits, technologies used, and lessons learned.\n\nSessions Details & Slides (if available)- https://sched.co/j3b0\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
