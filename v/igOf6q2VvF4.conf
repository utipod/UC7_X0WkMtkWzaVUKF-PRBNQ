description = "Re-engineering Election Process with Blockchain and Confidential Computing - Shivendra Yadav & Vikram Sharma, HCL Technologies Ltd.\n\nElections are intrinsic to any democratic country and are basic mechanism for selecting representatives in modern representative democracy. It has many forms and also applies to other processes which aim at electing a representative to hold office in any private or public institution. Great amount of effort goes in to making the process impartial but, it is often subjected to skepticism as it can be manipulated in following ways: a. Voter fraud- Ballot Stuffing, Voter Impersonation, Multiple voting by same voters. b. Counting manipulation c. Machine Rigging In this session, we would cover, how the existing election processes can be re-engineered with use of technology to enforce transparency, security and impartiality. The solution leverages Blockchain and Confidential Computing to bring aforesaid advantages.\n\nSession Details & Slides (if available)- https://sched.co/j3fJ\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n