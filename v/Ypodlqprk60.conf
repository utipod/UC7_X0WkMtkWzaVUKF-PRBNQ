description = "Governance and Audit of Blockchain Networks - Scott Perry, Schellman\n\nWhile blockchain technology creates strong cryptographic controls securing the integrity of data, successful, cooperative blockchain networks must establish trust between a variety of independent entities to create overall trust. In this presentation, Scott Perry will discuss how trust is created in at the blockchain layer of a Web 3.0 architecture stack that add trust within interoperable parties and reliance on external blockchains. As a Steering Committee member of the Trust Over IP Foundation, a Principal at Schellman leading a Crypto and Digital Trust practice and author of the first robust trust assurance model for blockchains, he will discuss how all blockchains networks can add accountability within stakeholder roles to ensure that blockchains are trustworthy above the embedded cryptographic trust assertions. The target of this presentation is leaders and participants in industry who are seeking greater acceptance and assurance in the trustworthiness of their network. Come learn which role systems auditors, cybersecurity professionals, and risk management experts will have to play to ensure trust must be built and maintained when adopting such cutting-edge technologies. \n\nSessions Details & Slides (if available): https://sched.co/14H48\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
