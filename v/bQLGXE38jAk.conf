description = "KrypC presented on a project called "The Other Bar" by the Fairchain Foundation, which tracks the supply chain of cocoa beans from farmers all the way to the final retail chocolate bar that is sold to end customers. After the solution was deployed and the company started seeing ROI, they asked a university in Netherlands to conduct a research to analyze and better understand the full cost analysis.\n\nRavi Jagannathan is the CEO and founder of KrypC Technologies. Ravi has over 30 years of corporate experience across US, Europe, Middle East and Asia in promoting the adoption of innovative solutions in new technologies. Ravi is a serial entrepreneur, visionary, angel investor and global citizen who continually works towards facilitating the blockchain movement from ‘disruptive’ to ‘mainstream’ technology.\n\n Hyperledger Special Interest Groups are open to anyone. Learn more here: https://wiki.hyperledger.org/display/SCSIG/Supply+Chain+SIG\n\nAbout KrypC\n\nKrypC is a fast-growing blockchain technology company with proven experience in delivering Blockchain solutions to large enterprises by driving value using KrypCore. KrypCore is the easiest way to develop, deploy and manage Hyperledger solutions. Low-code, domain-agnostic and cloud-agnostic KrypCore reduces 90% of the programing efforts at 1/3rd the cost and 3x the speed in comparison to any grounds up blockchain developments.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
