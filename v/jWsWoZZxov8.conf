description = "Panel: Cryptography: from Theory to Practice in Hyperledger - Hart Montgomery, Fujitsu Laboratories of America; Angelo de Caro, IBM; Mike Lodder, Independent; Brent Zundel, Evernym; Marta Piekarska-Geater, Balancer Labs\n\nWhat's going on in the world of cryptography in Hyperledger? What tools do we have? How do we use them? What problems are we trying to solve? We have gathered 5 panelists across all different areas of cryptography--from theoreticians to practical implementers--to help try to answer these questions in an interactive discussion. We will summarize the state of cryptography in Hyperledger and then break out into smaller groups to discuss various different topics, including (but not limited to) zero knowledge proofs, Fabric cryptography tools, cryptographic interfaces and tips for using them, post-quantum cryptography, and using cryptography for verifiable credentials. Participants will be free to jump around different groups in order to ensure that all of their questions, comments, and requests for Hyperledger cryptography are answered.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
