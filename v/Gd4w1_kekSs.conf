title = "From Web 2.0 to Web 3.0  - Kaleido & Fidelity - Consensus 2023"
description = "----\nSophia Lopez CEO @Kaleido and Sterling Mah Ingui - Head of Next Gen Retirement Products @Fidelity  moving from Web 2.0 to Web3 and enterprise-grade production. They emphasize simplicity and compliance. Kaleido has been involved with Hyperledger Foundation since its early days.\n\n✦\nMoving from Web 2.0 to Web3 for Enterprise-grade production\n00:00\n✦\nKaleido provides plug-and-play web3 services with 500 APIs.\n03:42\n✦\nMoving from web 2 to web 3 is real and provides better, faster, and cheaper outcomes.\n07:33\n✦\nGen 2 approach to building blockchain solutions is faster, cheaper, and more successful\n10:43\n✦\nFull stack approach accelerates time to value for web3 deployments\n13:55\n✦\nFidelity is exploring blockchain and web 3 opportunities for their workplace business.\n00:03\n✦\nEducation and up skilling are key to leveraging web 3 opportunities.\n19:56\n✦\nFidelity leverages blockchain through volunteer opportunities\n22:46\n\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about 