title = "Keynote: The Metaverse Continuum Creates a Defining Moment for Blockchain Leaders - Melanie Cutlan"
description = "Keynote: The Metaverse Continuum Creates a Defining Moment for Blockchain Leaders - Melanie Cutlan, Managing Director, Metaverse XR & Blockchain Lead, Accenture\n\nThe exponential pace of technology innovation is creating one of the most exciting periods of positive change and progress in history. The Metaverse, which is a continuum that stretches across all aspects of business, from consumer to worker and across the entire enterprise, is one of the five forces Accenture has identified that businesses must harness today to be the leaders of tomorrow.\n\nAs the future of the Internet advances, two important innovations are emerging: the Internet of Place—how to create and operate shared virtual spaces—and the Internet of Ownership—where blockchain and other technologies are creating unique verifiable digital identities for people and things, enabling everything from digital currencies to new products.\n\nThe momentum of the Metaverse is creating a defining moment for leaders in the blockchain space. In this keynote, Melanie will outline the changing expectations and opportunities ahead-more specifically how the Hyperledger community can build on its existing credibility and leadership position in Blockchain and replicate around Open Source and the Metaverse. \n\nSessions Details & Slides (if available): https://sched.co/18rxt\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
