description = "Blockchain - Sustainable Supply Chain, SDG, Climate & Carbon Credit Tokenization - Kamlesh Nagware, Snapper Future Tech\n\nBlockchain is fundamentally a technology of trust, blockchain has trust, openness, and transparency built into its design, its benefits are wide-ranging and impact multiple Sustainable Development Goals (SDGs). Blockchain has the potential to impact all 17 SDGs but here I will talk about specific to SDG7: Affordable & clean energy, SDG9 & 12: Build resilient infrastructure, promote inclusive and sustainable industrialization, and foster innovation & Responsible production & Consumption(Sustainable supply chains) and SDG13: Climate action where blockchain technology already being used to help achieve these SDGs effectively & efficiently. Hyperledger foundation has a special interest group “ Climate Action SIG” for The Climate Action & Accounting (CA2) Special Interest Group (SIG) will foster and engage a multi-stakeholder network to exchange ideas, needs, and resources in order to develop and consolidate open-source DLT solutions for a common climate accounting mechanism and frameworks. Blockchain technology can be the key that underpins the improved governance we need to meet the SDGs by 2030. \n\nSessions Details & Slides (if available): https://sched.co/14H4E\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
