description = "Making Distributed Ledgers Interoperable Using Weaver (Hyperledger Labs) - Venkatraman Ramakrishna, IBM\n\nThe emergence of DeFi and CBDC have created a pressing need for blockchain/DLT interoperability. Several research and development efforts have focused on this challenge, as interoperability is a key ingredient for Web3. In this talk, Ramakrishna will present the unique value proposition of Weaver, a Hyperledger Labs project, and show how it advances the state-of-the-art in DLT interoperability by enabling almost any cross-network operation using a combination of basic interoperability modes. He will describe the Weaver architecture, built on design principles of network self-sovereignty, avoidance of DLT modifications, and eschewing trusted mediators and third-party blockchains. Ramakrishna will show how Weaver implements protocols for cross-network data sharing, asset exchange, and asset transfer, leveraging the networks' native consensus mechanisms. These protocols have been used and validated by the Bank of France and HSBC to communicate ledger state and effect delivery-vs-payment across the boundaries of CBDC and securities networks built on Fabric and Corda. He will conclude the presentation with a list of features and supported DLTs in Weaver and the project's future roadmap. \n\nSessions Details & Slides (if available): https://sched.co/14H4f \nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
