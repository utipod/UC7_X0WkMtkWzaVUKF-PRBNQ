title = "A Hyperledger Fabric-based Programmable Money Platform - Robert van Donge & Dirk Hermans"
description = "A Hyperledger Fabric-based Programmable Money Platform - Robert van Donge, IntellectEU & Dirk Hermans, KBC Group\n\nDirk Hermans and Robert van Donge will present the outcomes of the close collaboration between KBC Group and IntellectEU within the context of KBC’s Programmable Money Platform. A platform built using Hyperledger Fabric and supported by IntellectEU’s Catalyst Blockchain Platform, that provides the foundational layer for tokens issuance, transfer, payment and redemption for numerous use cases that benefit greatly from Distributed Ledger Technology. They will be showcasing the high level architecture of this platform and discuss how use cases are - and will be - leveraging the platform. Some of these are reward tokens (KBC Kate Coin), flexible HR tokens (http://www.fleques.be), smart city & energy (http://tres.city), disrupting micro payments and other programmable money payments. The goal of this platform, which is supported by Catalyst Blockchain Platform, is to enable a wide variety of use cases. Expect to learn more about this project in production and how Hyperledger Fabric is transforming the Financial Services Industry! \n\nSessions Details & Slides (if available): https://sched.co/14H56\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
