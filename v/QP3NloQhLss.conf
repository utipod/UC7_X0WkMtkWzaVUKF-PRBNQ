title = "Bringing Trustworthiness in Industrial Device Lifecycle using Verifiable Credentials -Marquart Franz"
description = "Bringing Trustworthiness in Industrial Device Lifecycle using Verifiable Credentials - Marquart Franz & Saad Bin Shams, Siemens AG\n\nAn industrial device goes through many phases in its lifecycle. Its life begins with the manufacturing phase, after which it is transported to the customer where it is onboarded and then the operational phase starts. It can then continue on functioning before it is sold to a new owner or offboarded and perhaps also replaced. The proliferation of industrial IoT devices brings in more challenges for the operational technology. Customer site should be able to go through industrial device lifecycles from multiple vendors with as much ease as possible. In this talk the presenters explain how verifiable credentials can potentially help us in achieving a trustworthy and automated approach in cycling thorough the different device phases. With the help of demo that showcases prototype industrial devices approach using verifiable credentials for German Railway operator (Deutsche Bahn), the presenters will discuss the current tools available and dive into some of their shortcomings in the context of devices. This presentation also aims to bring forward the pertinent discussion of the disconnect in the world of devices and the web technology. \n\nSessions Details & Slides (if available): https://sched.co/14H61\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
