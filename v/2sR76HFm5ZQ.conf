title = "Evaluating Hyperledger URSA for Production Deployments - Pierre Roberge & Hart Montgomery"
description = "Evaluating Hyperledger URSA for Production Deployments - Pierre Roberge, Digital Identity Laboratory of Canada & Hart Montgomery, The Linux Foundation\n\nWith decentralized identity and tools maturing, many organizations are moving their focus from proof-of-concept (PoC) to mission critical systems dependent upon decentralized identity technologies. Several leading Canadian public and private organizations, using a “trust but verify” philosophy, required an independent cybersecurity review of the URSA library. Hyperledger URSA is a shared cryptographic library used to avoid duplicating other cryptographic work and increases security. It is an opt-in repository for Hyperledger and non Hyperledger projects to place and use crypto. Project sponsors, several Canadian public sector entities and Interac, recognise that end users rely on strong security to deliver high levels of assurance required of important consumer transactions with their governments and their financial institutions. Many of the world’s leading advancements in decentralized identity, several originating in Canada, rely on the Hyperledger family of technologies. The URSA library is a key component, depended upon to provide the security overlay for decentralized identity. Come join Pierre Roberge and Hart Montgomery to hear about the URSA review and its outcomes! \n\nSessions Details & Slides (if available): https://sched.co/14H5O\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
