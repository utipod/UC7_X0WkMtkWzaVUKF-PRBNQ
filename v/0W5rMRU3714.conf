description = "Hosted Discussion: Rhode Island Leads on Digital Identity Solutions with Hyperledger - Liz Tanner, State of Rhode Island & Jim Mason, DTCC\n\nThe smallest state in the US has become a leader in digital transformation in government under the leadership of Liz Tanner, Director, Dept. of Business Regulation. She has led the transformation for Digital Identity and Credentials in the state. Her department manages all the licenses and credentials for businesses and individuals. That covers accounting, restaurants, banking and all other types of businesses and professionals operating in the state. Leveraging Hyperledger Indy and Aries, Liz has delivered an MVP solution to issue SSI ( Self-Sovereign Identities ) to individuals and organizations using digital wallets. Licenses issued are credentials that a party can choose to share with others to validate their identity or credentials. Liz will cover Rhode Island’s digital transformation journey: how they got here, the opportunities they are focused on, the challenges they’ve identified and the forward strategies they use to deliver identity and digital solutions for digital government. \n\nSessions Details & Slides (if available): https://sched.co/14H6e\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
