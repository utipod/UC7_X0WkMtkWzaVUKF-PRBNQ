description = "The Hyperledger India Chapter Student Society is a community of students looking to push forward the use of Blockchain, DLT, and Hyperledger Technologies.\n\nIn view of this, we recently launched both our Official LinkedIn page, and now we are thrilled to announce our Official Discord Server, where we hope to have all of you come together and discuss all things Blockchain!\n\nYou can expect to meet fellow students like yourselves, as well as mentors from Hyperledger India Chapter. Use this platform to broaden your network, and share your achievements, projects, etc.\n\nGet ready to upskill like never before!\n\nMeet like-minded fellow students like you! Collaborate and form teams and networks with students from all over India!\nGet resources to advance your skills, attend events and sessions hosted by esteemed industry experts!\n\nFrom access to mentors to exclusive updates and student discounts and many more!\nCome join this community of students, by students, for students!\n\nIt is free and open for all to join!\n\nJoin using the invite link below:\nDiscord: https://lnkd.in/dww2GaP\n\nLinkedIn: https://lnkd.in/dMtpaUP\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
