title = "Untold stories behind the Hyperledger Community - Sophia Lopez"
description = "Every month we invite developers from across the Hyperledger ecosystem to share about why they're using Hyperledger projects and why they are actively involved in the community.\n\nEach episode features an in-depth discussion with a guest who is helping to shape the future of enterprise blockchain and their journey as a leader, developer and an open source contributor.\n\nConversations will delve into topics such as:\n\n- Why they got involved with Hyperledger\n- Why they're excited about the technology\n- How they deal with the challenges involved in contributing to a large, global open source community. \n\nIn episode 2, Ben Thomas, who leads marketing and communications at Hyperledger Foundation  sits down with Sophia Lopez, a pioneer in the blockchain space, who has been involved in the Hyperledger community from day one. Sophia shares her inspiring journey and career path, from studying Engineering Sciences at Harvard to her 10-year career at IBM and her most recent role as the President and Co-founder of the company Kaleido, who has been the main contributor of the Hyperledger FireFly Project.\n\nDuring the discussion, Sophia provides valuable insights into her mindset, where her infectious energy and entrepreneurial drive come from, and how her early career experience in research, financial analysis, business strategy, PR, marketing, and communications led her to join IBM and focus on technology. Sophia also talks about her pivotal experiences at IBM that impacted her decision to leave and become a company founder.\n\nSophia delves into the birth of Kaleido, how it all began, and the challenges that turned into light bulb moments or key pivots. She explains the reasoning behind contributing the Hyperledger FireFly project to the Hyperledger Foundation and provides advice to other organizations about why they should consider getting actively involved in the Hyperledger community.\n\nAs a leader in the field, Sophia also shares her experience with diversity in building open source community and code, and her advice to women looking to follow in her footsteps. Additionally, she provides insights into the biggest misconceptions enterprise businesses have about adopting new technology and the advice she would give to business and technical leaders trying to understand it or overcome challenges to adoption.\n\nThrough this engaging and informative conversation, listeners will gain valuable insights into the Hyperledger community, the power of open source blockchain technology, and the importance of diversity in building a successful and innovative open source community.\n\nRegenerate response\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/cas...\nTraining & Certification: https://www.hyperledger.org/learn/tra...\nTutorials: https://www.hyperledger.org/use/tutor...\nWebinars: https://www.hyperledger.org/learn/web...\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendo... \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
