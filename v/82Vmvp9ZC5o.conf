description = "A virtual meetup hosted by the Hyperledger India Chapter covering a range of Hyperledger projects.\n\nData visualization is vital for knowing about what’s going on your blockchain network. We will present about what you can do with Hyperledger Explorer, its architectural overview and the plans of what the community is planning to do next. Hyperledger Caliper is a workload generator tool for the performance measurement of distributed ledger technologies. Caliper is scalable, flexible, and extensible. Scale out easily to match the performance of your backend system. Tune every little detail about interacting with the backend system to suit your needs and scenarios. Implement workloads with arbitrary content and rate to mimic your business use case. Extend Caliper with custom modules to integrate it with your infrastructure of choice. Join the Caliper session to learn how to do all these!\n\n1. Hyperledger Fabric Production Deployment: Blockchain Automation Framework\nPriyanka Vats & Sownak Roy\n2. An introduction to Hyperledger Caliper - For users, and developers\nAttila Klenik\n3. Hyperledger Explorer Overview and Demo\nJeeva Sankarapandian & Atsushi Neki\n4. Hyperledger: A Technology For Geeks Or A Product For The Rest Of Us?\nIdowu Akinde\n\nMore about the event is at: https://www.meetup.com/Hyperledger-Bangalore/events/274315832/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerMeetups #Blockchain"
