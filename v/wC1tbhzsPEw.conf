description = "----\nEvery month we invite developers from across the Hyperledger ecosystem to share about why they're using Hyperledger projects and why they are actively involved in the community.\n\nEach episode features an in-depth discussion with a guest who is helping to shape the future of enterprise blockchain and their journey as a leader, developer and an open source contributor.\n\nConversations will delve into topics such as:\n\n- Why they got involved with Hyperledger\n- Why they're excited about the technology\n- How they deal with the challenges involved in contributing to a large, global open source community. \n\nEpisode 1 features Tracy Kuhrt who has been involved in the Hyperledger community for several years in several roles. She was a Linux Foundation staff member who supported the community, she has been a developer and a project maintainer, for the last two years she has led the Technical Oversight Committee as the group's chair and she is the Associate Director, Blockchain and Multiparty Systems Architecture at Accenture.  Because of the depth and breadth of her experience, she is a great guest to start our series with.\n\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
