title = "Formalizing and Standardizing Blockchain Interoperabi... Dhinakaran Vinayagamurthy & Rafael Belchior"
description = "Formalizing and Standardizing Blockchain Interoperability - Dhinakaran Vinayagamurthy, IBM & Rafael Belchior, Blockdaemon & Técnico Lisboa\n\nWith more blockchain networks being developed for specific applications and across layers of the stack, interoperability has emerged as one of the crucial features of blockchain technology to expand the blockchain tenets across multiple independent blockchain networks. Still a maturing technology, blockchain interoperability is undergoing research and development of solutions with different properties and tradeoffs. The technology necessary for achieving it is fragmented and a formal approach to the problem of general-purpose blockchain interoperability is still lacking. In this talk, Dhinakaran and Rafael will analyze the problem of blockchain interoperability from theoretical and practical standpoints. They will start by defining it and present an ontology for interoperability solutions. They will then present their existing standardization efforts in the IETF DLT Gateway Interoperability group. After that, they will present their ongoing work at the Hyperledger Interoperability Task Force on providing a formal security definition of interoperability across distributed ledgers using the framework of universal composability that is vetted by the cryptography research community. \n\nSessions Details & Slides (if available): https://sched.co/14H5d\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
