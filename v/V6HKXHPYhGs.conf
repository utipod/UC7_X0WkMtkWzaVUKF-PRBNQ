description = "Demo: Infrastructure for Managing, Sharing, and Utilizing Sensitive Data using Hyperledger Fabric Private Chaincode Running on Microsoft Azure - Koshi Ikegawa, Hitachi, Ltd.\n\nIn the World Economic Forum 2019, Data Free Flow with Trust (DFFT) was advocated. Especially for some domains such as medical institutions and governments, where privacy protection is essential, it must handle sensitive data such as healthcare data and personal information. Distributed ledger technologies such as Hyperledger Fabric make it possible to share data among multiple organizations with trust. However, it is not suitable for sensitive data because the distributed ledger discloses stored data to all organizations. Hyperledger Fabric has implemented features such as Channel and Private Data Collection to handle sensitive data. In addition, Hyperledger Fabric Private Chaincode allows transactions and data to be executed in a confidential manner by running chaincode on a Trusted Execution Environment (TEE) which is a CPU security feature. However, it requires a special machine with TEE. At the beginning of this presentation, Koshi will introduce OSS distributed ledger technologies, starting with Hyperledger Fabric Private Chaincode. Next, Koshi will introduce one of their use cases and show how to run Fabric Private Chaincode on Microsoft Azure. \n\nSessions Details & Slides (if available): https://sched.co/14H4K\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
