description = "Privacy Enabled Immunity Credential System on Blockchain - Harika Narumanchi, Tata Consultancy Services\n\nImmunity credentials facilitate vaccinated individuals to authenticate their immunity while returning to work or travel, etc. Privacy enabled credentials that do not rely on centralized parties are essential to secure users’ sensitive data. We present a decentralized system that provides verifiable credentials to prove immunity in a privacy preserving manner. Our system provides strong cryptographic guarantees for privacy and verifiability. We leverage a special cryptographic primitive, Content Extraction Signature (BLS Signatures), that enables selective disclosure of immunity claims in a verifiable manner. Immutable record of claims on Blockchain ensures authenticity of claims during the credential verification process. Our solution enables users to reuse the tamper-proof verification status recorded on blockchain ledger without recurrent proof generation and verification process.\nSessions Details & Slides (if available)- https://sched.co/j3ce\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
