description = "Demo: How Hyperledger Fabric Moves Charity to an Absolutely New Level of Trust - Olga Ilina & Artem Barger, Non-Profit Organization IDEAS\n\nCharity plays a significant role in our society and is considered by many people as the most common way to repay our social debt.\n\nThe Karma project is a blockchain-based charity foundation platform that facilitates the trustful network's formation and is accountable for collecting donation funds. Karma platform introduces a blockchain-based solution that allows participants to supervise, manage and control all the platform's processes. \n\nThe blockchain network is comprised of publicly known, trustful, and prestigious organizations. All organizations' operations within the platform are fully transparent and visible, leveraging properties of immutability, provenance, and non-repudiation. Therefore the platform alleviates the results of dishonest actions, revealing fraudulent organizations' activities.\n\nThe blockchain-based Karma platform is implemented on top of Hyperledger Fabric and appears as a social apparatus that allows charity fonds to manage and maintain their projects, accept donations and share auditable public trail of all activities within the platform. \n\nSessions Details & Slides (if available): https://sched.co/15AjF\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
