title = "Elevating Trust with cert-manager in Hyperledger Fabric - Alexander Meijer, Corsha, Inc."
description = "Elevating Trust with cert-manager in Hyperledger Fabric - Alexander Meijer, Corsha, Inc.\n\nTrust is a key issue in any network, but is perhaps of paramount importance in blockchain networks. It is so crucial, in fact, that "Trust" and its derivatives are mentioned no less than 14 times in Satoshi's seminal Bitcoin whitepaper. Hyperledger Fabric networks are no exception; in Fabric, trust flows from the Certificate Authorities (CAs) to every participant on the network who utilize that trust to transact according to their role. Operating these CAs properly, then, is central to the trust and security model of Fabric. In this discussion, Alex will reinforce why using centralized PKI generators (such as cryptogen) presents a trust risk for production networks. Corsha's experiences with the Fabric CA will also be discussed, and why it was ultimately decided that the operational overhead of that system made ongoing maintenance challenging. Alex will introduce the cert-manager project and go over how Corsha integrated that with their Kubernetes-native Hyperledger Fabric networks. Finally, Alex will propose a Fabric network architecture that does not rely on a trusted setup and does not require any CA servers, with fully automated certificate management. \n\nSessions Details & Slides (if available): https://sched.co/14H3z\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
