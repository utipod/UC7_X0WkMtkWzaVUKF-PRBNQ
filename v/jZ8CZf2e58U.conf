title = "Using Blockchain to Reduce Electronic Waste and Make Recycling Commercial Viable - Nina Schmulius"
description = "Using Blockchain to Reduce Electronic Waste and Make Recycling Commercial Viable - Nina Schmulius, 7479c\n\nAccording to the UN report, we produced 53.6 million tons of e-waste in 2019. Less than 20 percent of it was collected and professionally recycled. What happened to the rest is uncertain. But it is assumed, that a lot of electronics ends up in garages or basements and never reaches recycling yards. We know also, that companies resell e-waste on a grand scale from countries like US, Germany or UK to nations like Ghana, India or Brazil. There the e-waste ends up in landfills, handled unprofessionally, poisoning humans and environment. Yet old devices are real gold mines: smartphones, laptops, refrigerators contain valuable metals and rare earths, their recycling is economically and ecologically worthwhile. So it is time to develop new solutions for how we deal with e-waste – one includes blockchain, that allows us to make the recycling process traceable for consumers.\n\nSession Details & Slides (if available)- https://sched.co/j3e3\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
