description = "Last Mile Problem in Self-Sovereign Identity - Biometric Authentification and Device Independent Wallet for Hyperledger Indy - Non Kawana & Ken Naganuma, Hitachi,Ltd.\n\nSelf-sovereign identity, in which identity is managed by the individual, is spreading. In this scheme, personal smartphones are often used to store and manage wallet information such as VC and secret keys for digital signature. However, this is not a true self-sovereign identity. For example, the problem exists that when a smartphone is lost, the individual's identity can no longer be proven. We think that identity is an object that should be tied to a person, not a smartphone. Therefore, we have developed an architecture to handle SSI without using a smartphone or other personal device, and implemented it in Hyperledger Indy. Specifically, by generating the secret key for Hyperledger Indy’s wallet from the individual's biometric information and encrypting and storing the wallet in the cloud storage. In this way, the wallet can be used by the user from various terminals on the network. In this presentation, we will present our architecture of our device-independent SSI and a demonstration of biometric authentication technology implemented on Hyperledger Indy. \n\nSessions Details & Slides (if available): https://sched.co/14H4u\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
