description = "The Hyperledger community is launching the Hyperledger Challenge to harness the power of communities to ideate, develop, and launch innovative solutions developed using open-source technologies. Any innovation that advances the current state-of-the-art of enterprise-grade distributed ledger technologies leveraging one or more Hyperledger projects is eligible for the Hyperledger Challenge.\n\nThe Challenge will feature three rounds, called “Ideate”, “Prototype”, and “Launch”, to develop innovations from idea to sustainable solutions in the manner of months. Innovators competing in the challenges will have access to training, mentors and the Hyperledger community to support the development of their solution. The Hyperledger community is committed to be a driving force to incorporating Diversity, Civility, and Inclusion into programs. Innovators are greatly encouraged to consider diversity and inclusion when developing their teams.\n\nThe Hyperledger Foundation is committed to creating a safe and welcoming community for all. Therefore, all innovators of the Hyperledger Challenge are requested to visit the Hyperledger Code of Conduct and Antitrust Policy Notice.\n\nThe prototype phase brought live demonstration of the ideas submitted earlier to the Hyperledger Challenge 2022. Top shortlisted teams presented their ideas to the jury members live through open community channels. The global event is organized by the community volunteers from around the world. Read more at https://wiki.hyperledger.org/display/events/Hyperledger+Challenge+2022.\n\n---\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
