title = "Panel: Accelerating the Journey to Production for Blockchain in Supply Chain"
description = "Panel: Accelerating the Journey to Production for Blockchain in Supply Chain - Ajay Dholakia, Lenovo; Anand Kashyap, Fortanix; Eduardo Garcia & Marie Carter, Accenture; Gari Singh, IBM; Michael Reed, Intel \n\nIt’s a new decade in blockchain―enterprises have realized that it is crucial to collaborate with technology partners to accelerate their blockchain journeys and succeed with solutions across their ecosystems. There are many considerations and decisions to be made, and it can be challenging to discern what is relevant from the abundance of noise in blockchain. To address these challenges, Accenture and Intel have brought together the best-in-industry technology partners―IBM, Lenovo, and Fortanix―to inform decisions and accelerate our clients’ blockchain-based solutions.\n\nIn this panel discussion, Accenture and Intel will be joined by IBM, Lenovo, and Fortanix as they discuss their process in delivering an integrated, high-performing, and secured blockchain solution for supply chains that developed an approach to facilitate, accelerate, and simplify enterprise blockchain journeys. They will highlight the common challenges that enterprises face when moving from blockchain proof-of-concept to pilot testing, and ultimately to production, and how to leverage a portfolio of technical components to enhance flexibility, security, and privacy.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
