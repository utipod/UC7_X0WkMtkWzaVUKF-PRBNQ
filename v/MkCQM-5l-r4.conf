title = "View from the Trenches: Practical Issues In Enterprise Blockchain Implementations and... Baohua Yang"
description = "View from the Trenches: Practical Issues In Enterprise Blockchain Implementations and Potential Solutions - Baohua Yang, Oracle \n\nThis session will discuss some critical problems and requirements when implementing the Hyperledger Fabric blockchain in real-world implementations, including node recovery, blockchain checkpointing, and byzantine fault-tolerant consensus.Although the original public blockchains rely on a self-sovereign management style with complete decentralization, in the enterprise-based consortium blockchains the participating enterprises are often concerned about maintaining their own nodes with efficiency and resiliency, while at the same time, working as part of a cross-company blockchain network.This requires a secure and flexible governance model and on-chain collaboration mechanisms to address the many operational issues at different layers of the blockchain network – from interoperable connections, to storage management, membership governance, chaincode distribution, etc. We will share our experience and approaches to addressing these considerations and invite further technical discussions in the community towards practical solutions.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
