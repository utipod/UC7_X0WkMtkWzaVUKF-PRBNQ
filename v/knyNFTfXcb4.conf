description = "Efficient Anonymous Updatable Credentials - Samuel Jaques, University of Oxford\n\nMaybe you want to put your credentials on the blockchain, but you're worried about privacy. You don't want to be tracked every time you present your identity. One option is something called an accumulator. Accumulators use a short piece of data to represent a list of credentials, with users doing most of the work to maintain extra data to prove that they have a valid credential. Accumulators can easily issue and revoke credentials, and can be constructed with high privacy guarantees and little trust required. However, this makes them slow. Many variants on the classic constructions have been proposed to improve performance, but these compromise privacy and trust, sometimes in subtle ways. In this talk Sam will give an overview of what accumulators are, how they can be used, and describe some fundamental limits on the trade-off between privacy and efficiency. He and collaborators are working on a new approach which uses distributed trust to avoid some of the theoretical limits and create a completely anonymous accumulator that should be faster than previous methods. \n\nSessions Details & Slides (if available): https://sched.co/14H4l\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
