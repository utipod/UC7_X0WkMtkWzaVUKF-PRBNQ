description = "Creating Trust in Enterprise Blockchain Networks - Scott Seth Perry, Scott S. Perry CPA, PLLC \n\nWhile blockchain technology creates strong cryptographic controls securing the integrity of data, successful, cooperative blockchain networks must establish trust between a variety of independent entities to create overall trust.In this presentation, Scott Perry will discuss how trust is created in block chain systems and the varying layers (i.e. ledger, agent, credential exchange and governance) that add trust within interoperable parties and reliance to external blockchains within the web of trust.\n\nAs an active member of the Sovrin Goverance Working Group and author of the first robust trust assurance model for blockchains, he will discuss how all blockchains networks can add accountability within stakeholder roles to ensure that blockchains are trustworthy above the embedded cryptographic trust assertions.\n\nThe target of this presentation is leaders and participants in industry, jurisdictional and public utility blockchains who are seeking greater acceptance and assurance in the trustworthiness of their network.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
