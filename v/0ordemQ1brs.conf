description = "Hyperledger Aries and Indy are open source projects that can be used to create and use independent digital identities rooted on blockchains or other distributed ledgers.  In this video, Ken Ebert, CTO of Indicio.tech, explains more about what digital identities are, why they're important, and what is happening in the Hyperledger community around this topic.\n\nKen will also be one of the instructors at two free 4-hour long workshops focused on Hyperledger Aries and Indy happening in early 2022.  If you're interested in learning more about digital identities and how to use Hyperledger Aries and Indy to build identity solutions, you're welcome to sign up for the workshops.  Note that space is limited and spots are filling up fast.\n\nSign up for the Build Your Identity Solution Using Hyperledger Aries workshop on Thursday, January 20, 2022 from 8 AM to noon Pacific at:\n\nhttps://wiki.hyperledger.org/display/events/Build+Your+Identity+Solution+Using+Hyperledger+Aries\n\nSign up for the Hyperledger Indy Technical Deep Dive on Thursday, February 3, 2022 from 8 AM to noon Pacific at:\n\nhttps://wiki.hyperledger.org/display/events/Hyperledger+Indy+Technical+Deep+Dive\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
