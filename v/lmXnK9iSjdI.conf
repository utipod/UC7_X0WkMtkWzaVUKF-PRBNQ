description = "Real-Estate Property Management – Application of NFT, Tokenization, and DeFi - Mohan Venkataraman & Gigo Joseph, Chainyard (IT People Corp.)\n\nThe blockchain and DLT technologies have disrupted traditional business processes and helped transform them into new and innovative business models. Real estate and property markets are one area where the concepts of digital titles, real-estate NFTs, and fractional ownership are being explored. At Chainyard, we have been working with real estate clients to help strategize their use-cases and implement solutions. This presentation will highlight various use cases in the real estate domain but focus specifically on one related to a Property Management opportunity we worked on. The presentation will provide a description of the use case and a high-level overview of the business process. It will also discuss solution development applying NFT, tokenization, and DeFi concepts. It will conclude with a conceptual architecture of the solution. Apart from technical considerations, it is very critical to have the business model well defined and ensure compliance with prevailing securities regulations. Based on our experience, the presentation will highlight key considerations and challenges that are important to be addressed while developing the solution architecture. \n\nSessions Details & Slides (if available): https://sched.co/14H4T\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
