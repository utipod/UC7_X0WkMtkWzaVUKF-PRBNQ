description = "... Governance\n\nMohan Venkatamaran & Isaac Kunkel, Chainyard\n\nThis session will review a blockchain reference architecture that has been developed based on experience with Hyperledger Fabric. The presentation will first provide an overview of the reference model noting blockchain specific elements. It will then identify several specific technical and business patterns that are supported by the reference architecture. It will finish up by demonstrating how this blockchain specific reference architecture takes a holistic perspective of the solution, including both technical and business governance, for consideration during the design phase.\n\nThe reference model itself has dozens of elements which are grouped by business, users, application, tools and platform services. Within the platform services, we see sub-groupings of common and blockchain specific elements.\n\nPatterns will include 8 design patterns that facilitate the development of blockchain solutions include several smart contract specific patterns.\n\nThe presentation will work to tie the importance of considering both technical and business governance into the design elements of the solution.\n\n0:00 Introduction\n1:16 ABOUT CHAINYARD\n4:07 INTRODUCTION\n5:52 CORE PRINCIPLES OF ARCHITECTURE\n8:17 BLOCKCHAIN REFERENCE MODEL\n17:30 CONSORTIUM GOVERNANCE REFERENCE ARCH\n23:24 SECURITY & DEPLOYMENT REFERENCE MODEL\n25:57 SYSTEMS ARCHITECTURE REFERENCE MODEL\n27:04 BLOCKCHAIN ANALYSIS REFERENCE\n29:13 HYPERLEDGER FABRIC - DATA DESIGN PATTERNS\n32:14 PEER - CHANNEL - CHAINCODE PATTERNS\n34:41 BLOCKCHAIN DESIGN AND CODING PATTERNS\n37:22 NETWORK CONFIGURATION PATTERNS\n38:57 BLOCKCHAIN BUSINESS PATTERNS\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
