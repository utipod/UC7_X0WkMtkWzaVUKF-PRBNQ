description = "Blockchain, the distributed ledger technology (DLT) underlying bitcoin, is far more valuable than the currency it supports. As enterprises start to put distributed ledger technology into practice, it’s important to understand the security implications. We’ll look at public vs. private blockchains and lessons learned for enterprises moving to DLTs. We will walk through real life deployments of Blockchain solutions and discuss how Blockchain can both enhance security but also when built into traditional solutions requires traditional security measures. This talk will leave you with understanding how Blockchain does, and does not, change the security requirements for your enterprise. Then we’ll talk about Hyperledger’s new Bug Bounty program. Join us!\n\nIn this session you will:\n\n• Learn that Blockchain is a tool, not a solution; we will define specific use cases\n• Walk away with an understanding of private vs permissioned blockchains\n• Develop a better understanding of the flexibility, security and regulations that will need to be met\n• Get details on the Hyperledger Bug Bounty Program\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
