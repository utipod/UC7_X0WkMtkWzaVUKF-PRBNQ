description = "Panel: Welcome To The New Normal: The Lessons Learned From Hosting Virtual Hyperledger Meetups - John Carpenter, Global Blockchain Summit and Pinnacle Cart; David Boswell, Hyperledger; Jyoti Ponnapalli, DTCC; Alfonso Govela, Blockchain Merida; Jim Mason\n\nAs the COVID-19 crisis in 2020 caused the normal in-person Hyperledger Meetups to shift to Virtual Meetups, Meetup organizers from around the world adapted to this change quickly. This virtual transformation allowed Meetup organizers to reach new audiences that would not have been connected with previously, as well as engage with new speakers that would have been generally unavailable in a local live presentation Meetup setting. Additionally, there were lessons learned about collaboration between Meetup organizers as well as preserving the networking that is a critical part of any Hyperledger Meetup. Join our panel of Meetup organizers that embraced this digital transformation, and discover how we can use these lessons to improve the decentralized and distributed Hyperledger community interaction going forward.\n\nSessions Details & Slides (if available)- https://sched.co/j3b6\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
