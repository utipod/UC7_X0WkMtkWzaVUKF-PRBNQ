description = "Blockchain, Biometrics and Geo-Location: Lessons Learned from the Implementation of Innovative Technologies at the United Nations Joint Staff Pension Fund - Shashank Rai, United Nations Int\n\nIn January 2021, in accordance with its digital transformation strategy, UNJSPF deployed a solution based on blockchain and biometrics to transform a legacy process with a global reach (80K beneficiaries located in more than 195 countries). UNJSPF beneficiaries are required to sign and submit a ‘Certificate of Entitlement,’ or ‘CE,’ every year as a “proof of existence” and "proof of country of residence", to continue receiving their benefits. The UNJSPF ‘Digital CE solution" aimed to create, verify, and secure the digital identities of beneficiaries - while also preventing fraud – using biometrics; identifying their locations with geo-location technology; and storing transactions on an immutable, traceable and independently auditable ledger, using the Hyperledger Indy blockchain platform. This session highlights the lessons learned after the first year of implementation of the Digital CE solution, addressing both technical and process related aspects of the deployment. This solution was selected as a finalist of two prestigious awards: The 2021 UN-Secretary-General's award for innovation and sustainability; and the 2020 Gartner’s Eye on Innovation Awards for Government. \n\nSessions Details & Slides (if available): https://sched.co/14H5m\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
