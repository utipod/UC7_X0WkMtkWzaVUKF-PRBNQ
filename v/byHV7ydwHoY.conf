description = "Fabric Private Chaincode Tutorial - Maria Munaro, Independent & Marcus Brandenburger, IBM Research\n\nFabric Private Chaincode (FPC) is a new security feature for Hyperledger Fabric that leverages Trusted Execution Technology to protect the integrity and confidentiality of Smart Contracts. In this lab the audience will learn what Fabric Private Chaincode is and how it can be used to implement privacy-sensitives use cases for Hyperledger Fabric. The goal of this lab is to educate developers with all necessary background and first hands-on experience to adopt FPC for their projects. This Lab begins with an introduction of FPC, explaining the basic FPC architecture, security properties, and hardware requirements. Moreover, we will cover the FPC Chaincode API and the applications integration using the FPC Client SDK. To complement the learning experience, the audience will interactively write, build, and deploy their first FPC Chaincode. We conclude this session with a Q/A discussion.\nSessions Details & Slides (if available)- https://sched.co/j3ch\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
