description = "A guest presentation by Tom Baumann and Henry Kim at the Hyperledger Climate Action and Accounting Special Interest Group on January 26, 2021.\n\nClimate action accounting, often referred to as measurement, reporting and verification (MRV) has many challenges that digital solutions can help resolve. Although blockchain in combination with IoT and other digital technologies can help to address climate data track and trace in support of climate finance and resources to support climate actions (e.g. climate-smart agriculture), there remains the basic challenge that MRV standards, and the MRV standards system itself, is fragmented and archaic. This not only a climate issue but is a major problem of “greenwashing” claims. Therefore, digital solutions also need to be leveraged to support a nextgen MRV standards system to (1) improve the interoperability and cohesiveness of the MRV standards and outputs, as well as (2) expedite a qualitity-controlled process of converting (existing and new) plain language MRV standards into MRV “smart standards” (similar to smart contracts), for example via semantic web ontologies and XBRL frameworks to bridge MRV standards with DLT-enabled solutions.\n\nMore about the Hyperledger Climate Action and Accounting Special Interest Group is at: https://wiki.hyperledger.org/display/CASIG/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerClimateAction&AccountingSIG #Blockchain"
