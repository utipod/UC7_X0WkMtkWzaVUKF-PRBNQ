description = "Selling Blockchain to the C-Suite - James Wester, IDC \n\nThe benefits of blockchain across multiple use cases and industries are becoming evident as more pilots and proofs of concept are implemented, including lower costs and increased efficiencies. But making the leap from pilot to production is a challenge for many technology and innovation organizations as they struggle to quantify those benefits in terms that satisfy c-level executives. That challenge is made more difficult by the fact that blockchain projects don't always lend themselves to traditional business models. (Example: If costs are distributed, how are returns realized?) This Think Tank will look at how projects that are already seeing success have been justified, including business models, metrics and more. It will look at the many use cases being developed by vendors in the blockchain space and how those projects have been assessed in terms of business value. The intent of the session is to help technologists learn how to evaluate their projects and sell blockchain to the c-level.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
