title = "Hyperledger Supporting Blockcerts Compliant Digital Diplomas across Colombian Universities"
description = "Carlos Castro-Iragorri, Universidad del Rosario\n\nWe have implemented a PoC for managing academic certificates on a permissioned blockchain. We are currently working within the scenario posed by Universidad del Rosario in Bogota, Colombia. We are adapting and extending the Blockcerts standard and using Hyperledger Fabric, Composer and Angular for our end-user implementation; our solution is independent from any existing cryptocurrency. Also, it is built as a network of ledgers sharing a common data structure, smart contracts and a limited set of assets. Moreover, our ledger acknowledges the aggregative structure of academic certificates; thus, making it possible to manage atomic units while facilitating the definition of relations across these units. Distributed ledgers have proven to be a viable technical solution for managing financial assets; we are using this technology to manage a different asset, academic certificates.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2018 #Blockchain"
