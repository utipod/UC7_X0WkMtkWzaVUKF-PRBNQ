description = "Connecting Ecosystems: Blockchain Interoperability - Hart Montgomery, Fujitsu Laboratories of America & Peter Somogyvari, Accenture \n\nFollowing on last year's presentation, https://hgf18.sched.com/event/JKe4, Accenture will provide an update on their continued work around Blockchain Interoperability.\n\nThe solution defines a communication model to enable permissioned blockchain ecosystems to exchange any on-chain data or custom assets (fungible/non fungible) independent of the platform (e.g. Hyperledger Fabric, Quorum, etc.) without a middleman. This projectimplements an interoperability validator network, which is an overlay network of hand-picked actors that will validate and sign data before sharing. An “interoperability validator” overlay network is introduced for each of the interoperable blockchains. Interoperability validators are known or broadly discoverable by the ecosystem and are typically participants already taking part in the governance or consensus.\n\nThis project proposes an alternative to existing interoperability models, and it is designed specifically for permissioned blockchain networks.\n\nAn update on the project status willbe provided together with an overview on the roadmap and the planned future work. A live technical demo showcasing the protocol in action will be provided.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
