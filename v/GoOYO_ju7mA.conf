description = "A virtual meetup hosted by Hyperledger Sydney focused on performance improvements for Hyperledger Fabric.\n\nThe blockchain research group at Xilinx, the leading FPGA vendor, has been studying different methods to improve the performance of Hyperledger Fabric, and other blockchains. Historically, FPGA chips have been used to accelerate PoW mining for Bitcoin and Ethereum in the early days of the cryptocurrencies. They are also being used for several alt-coins.\n\nIn this event, Blockchain researcher Dr. Haris Javaid from Xilinx will share his current focus on identifying specific areas of HLF that can benefit from hardware acceleration, and showcase work identifying these bottlenecks. Dr. Haris Javaid will describe how Xilinx have improved the performance for block validation in HLF by an order of magnitude. A short demo of proof-of-concept work will be followed by discussion.\n\nMore about the event is at: https://www.meetup.com/Hyperledger-Sydney/events/273899207/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerMeetups #Blockchain"
