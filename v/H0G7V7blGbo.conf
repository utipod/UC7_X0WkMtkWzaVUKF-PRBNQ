description = "The potential of Blockchain and Crypto-currency technologies and the fervent activity in the space has made it imperative for Governments to evolve regulatory frameworks and policies to manage and leverage the technology. Some are considering National Cryptocurrencies, others giving legitimacy to decentralized ones like Bitcoin while most are waiting and watching.\nAn alternate to Decentralised Cryptocurrencies and distinct National Cryptocurrencies, is the 'Crypto-Fiat'. A portion of the fiat money in circulation can be overlaid with cryptocurrency characteristics, creating a crypto equivalent of the Dollar, Pound, Euro, Swiss Franc, Rupee etc.\n\nIntroduction of Crypto into core banking areas can help deliver innovative customer features and offerings. When applied to Loans and Government finances these can help bring about Transparency and Accountability in Public Spending.\n\nSpoole Systems' Hyperledger based TRAX platform, built around this concept is a non-disruptive way of ushering Crypto into the economy and mainstream banking. Enterprises too can leverage the concept and platform to streamline, track and control movement of cash or other digital assets between participating intra / inter-company entities. TRAX' multi-tiered, multi-ledger architecture and bridge components isolate critcal tasks like Asset creation and management, from retail Asset transfer transactions. \n\nHorizontal scalability (across organization boundaries, regions ...) an Vertical scalability (across Custodians / Auditors / Regulators and Retail entities ...) are inherent to such an implementation. \n\nTransaction Trees, Graphs and Dashboards, Messaging and Workflows provide intuitive asset flow and control snapshots.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2018 #Blockchain"
