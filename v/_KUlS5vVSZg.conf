description = "Blockchain-based Decision-support and Longitudinal Data Storage, with Illustration for Diabetes Type 2 Management - Alevtina Dubovitskaya, HSLU (Lucerne University of Applied Sciences and Arts)\n\nClinical decision pathways evolve and demand multiple assessment steps, access to distributed data sources, and orchestration of various processes executed by diverse consortia of stakeholders. Alevtina will present a demo of a blockchain-based system for decision support and longitudinal data storage, with a use case based on the treatment of diabetes type 2. The system allows encoding dynamic processes and rules that access relevant data and guide clinicians and patients towards optimal decisions in a shorter time. The Business Process Management (BPM) technology is layered on top of a blockchain-based architecture that leverages private data collections and multiple channels for privacy and separation of concerns. The use of blockchain also allows collecting data from the everyday care of broad populations, opening an opportunity for a fundamentally new style of medical research.\n\nSessions Details & Slides (if available)- https://sched.co/j3do\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
