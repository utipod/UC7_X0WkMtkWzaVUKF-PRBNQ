description = "The March Mortgage Industry Subgroup Update was happy to be joined by Daniel Szegö, DLT Architect, who discussed tokenization in financial services.\n\nHosted by Mortgage Industry subgroup co-chair Marvin Bantugan and James Hendrick providing an update on the state of blockchain in the mortgage industry.\n\nDaniel Szegö is a software architect who has worked with various distributed ledger technologies for over five years, including but not limited to #hyperledgerfabric, #indy, #ethereum, and #polygon - also an active member of the Hyperledger community.\n\nTimestamps:\n00:00 Welcome and presentation\n02:22 Community information\n03:51 Status of blockchain in the mortgage in the mortgage industry\n12:00 Tokenization in financial services with Daniel Szego\n46:00 Q&A\n\nJoin the FMSIG Mortgage Subgroup Wiki: https://wiki.hyperledger.org/display/CMSIG/FMSIG+Mortgage+Industry+Subgroup\n\nSubscribe to the mailing list to receive the latest updates: https://lists.hyperledger.org/g/financial-markets-sig\n\nFollow the Hyperledger Financial Markets Special Interest Group LinkedIn page: https://www.linkedin.com/showcase/hyperledger-financial-markets-sig/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
