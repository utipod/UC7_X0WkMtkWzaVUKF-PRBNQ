description = "En esta ocasión Teléfonica nos presentará el uso de Blockchain para revolucionar la cadena de suministro.\n\nTelefónica en el 2018 lanzó una plataforma para transformar la forma para colaborar con terceros haciendo que las Cadenas de Suministro e2e sean más rápidas, sencillas y eficientes.\n\nTelefónica inició con la cadena de suministro de uno de sus productos principales, CPE (Customer Premise Equipment), los enrutadores, Decos y otros dispositivos que permiten brindar conectividad y servicios en el hogar a sus clientes. Se fabricaron más de 15 millones de dispositivos serializados al año que luego fueron distribuidos e instalados por una fuerza de campo de más de 30.000 técnicos.\n\nActualmente esta solución Blockhain está implantada en producción para las operaciones de Telefónica en Brasil y los planes son extender al resto de las operaciones fijas y otros productos en los próximos meses\n\n• Presentadores:\nCecilia Jimenez García\n\nAngel García Pujalte\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerMeetups #Blockchain"
category = "Science & Technology"
title = "Casos de uso blockchain empresariales: Revolucionando la cadena de suministro con Telefónica"
