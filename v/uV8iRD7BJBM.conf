description = "Beyond the Language Barrier – Translating Hyperledger Fabric Documentation Into Japanese - Yuki Kondo, Hitachi, Ltd. & Daiki Nakashima, Mitsubishi Electric Corporation\n\nHyperledger Fabric is used for various use cases all over the world. However, it was hard for non-English speakers to learn the technology correctly because the official documentation was written in English and updated quickly. The quick updates made the local language's learning resources outdated soon. To remove the language barrier, Hyperledger Fabric Documentation Working Group started translating the official documentation in various language. When the content is available in the native language, more non-English speakers will easily learn and adopt Hyperledger Fabric technologies. As one of the sub-groups, Japanese Doc WG was launched in July 2020. Japanese Doc WG created the translation contribution process, communication channel (e.g. monthly Zoom meeting, Japanese chat group) and Kanban board. To improve the productivity and quality, Japanese Doc WG made Japanese terminology and introduced a translation tool while collaborating with translation experts. Japanese Doc WG also hosted Meetups to increase the number of contributors. In this session, Japanese Documentation WG will share their experiences for other language communities to work on the translation. \n\nSessions Details & Slides (if available): https://sched.co/14H4H\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
