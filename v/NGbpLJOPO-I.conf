description = "Market research is an invaluable industry for every market; learning what the consumer likes and how they want it is vital. Unfortunately, the industry has not evolved since its inception in the 1950s. Since then both market trends and technologies have advanced considerably; it’s time for a rebirth. Enter the world’s first USPTO consumer opinion and behavioral data economy blockchain enabled survey. We now have a way to identify and capture consumer opinions and behavioral data in an ultra-secure and at the highest GDPR level 1 compliant manner.\n\nChainNinja Blockchain Solutions, world-class Blockchain development and advisory firm, as The Opinion Economy’s development partner, successfully developed and deployed the Opinion Economy’s blockchain network, which is leveraged to connect brands to consumers for survey research purposes. On Friday, October 5th, 2018, the newly developed OEB application was successfully deployed and demonstrated the capability to self-enroll its first Contact Agency, Survey Agency and group of Respondents. These parties were then able to complete an automated peer-to-peer transaction within minutes of enrollment, marking the first live transaction. identify and capture consumer opinions and behavioral data in an ultra-secure and at the highest GDPR level 1 compliant manner.\n\nhttps://hgf18.sched.com/event/JXCJ/empowering-the-consumer-revitalizing-the-relationship-between-the-consumer-and-brand-data-is-the-new-bacon-lisa-marks-chainninja\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
