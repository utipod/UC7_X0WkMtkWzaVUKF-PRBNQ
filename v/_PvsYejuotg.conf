title = "US Digital Currency: Opportunities, Challenges and Strategies - Jim Mason, DTCC"
description = "US Digital Currency: Opportunities, Challenges and Strategies - Jim Mason, DTCC\n\nWorking in the DLT / blockchain space delivering solutions on different platforms, Jim will review the digital currency landscape with a focus on FinTech solutions for CBDC ( Central Bank Digital Currency ) in the US. CBDCs have been researched by many countries and a few have implemented a CBDC. With the US Executive Order in March 2022, the goal is now to understand the value of a US CBDC in the economy, financial markets and trade and recommend how a CBDC should be implemented. We will identify CBDC directions from the Executive Order and the research the Federal Reserve and other organizations delivered. The Digital Dollar Project, a partnership of Accenture and the Digital Dollar Foundation, is leading the discussion and exploration on US CBDC with other organizations including DTCC. We’ll review work on a Fed Coin, the Hamilton project ( OpenCbdc ) reviewing scalable architecture concepts for a CBDC and the Lithium project ( part of the Digital Dollar Project ) which uses CBDC for immediate settlement of security trades between parties that can be regulatory compliant. Attendees will get a deeper understanding of the goals, challenges and potential benefits of US CBDC.\n\nSessions Details & Slides (if available): https://sched.co/14H6h\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
