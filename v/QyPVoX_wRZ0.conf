description = "Blockchain Eco-system in India - Kamlesh Nagware, Snapper Future Tech & Arun S M, Hyperledger India Chapter\n\nGrowing Blockchain start-ups ecosystem in India, Indian blockchain start-ups solving very interesting business problems in agriculture, waste management, skill credential. In India, various state governments are piloting e-governance use cases. As per govt. statistics more than 20+ state govt. is trying e-governance implementation. Telangana govt. has setup T-hub, one district to support and build blockchain-based solutions, Tamilnadu state has its own state-level blockchain strategy. There are many initiatives undertaken by the Indian govt. Niti Ayog (Planning commission of India), NISG (National Institute of Smart Governance) and very recent Indian Govt. issued their national blockchain strategy and Centre of Excellence for Blockchain (Apiary by Meity & STPI) start-ups to help start-ups and government to adopt blockchain technology for smart governance. \n\nTo learn more about Hyperledger, the open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments. Which serves as a neutral home for various distributed ledger frameworks including Hyperledger Fabric, Sawtooth, Indy, as well as tools like Hyperledger Caliper and libraries like Hyperledger Ursa click here: https://www.hyperledger.org/\n\nSession Details & Slides (if available)- https://sched.co/j3bv\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger 