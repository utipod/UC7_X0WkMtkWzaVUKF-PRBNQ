description = "Decentralizing Access Controls through Blockchain - Nitesh Emmadi, TCS \n\nEver since Bitcoin, there has been a lot of interest in the idea of decentralizing other services/applications using the under-lying blockchain. The notion of distributing control to several entities instead of a single entity guarantees and improves the security of an application. We propose decentralization of access controls on file storage system with a combination of blockchain, erasure codes and secret sharing. Traditional access control mechanisms restrict access to the data through a layered approach and are centralized. These mechanisms can be single point of failure. Hence, decentralizing the access controls improves the security guarantees of the system significantly. We also present an implementation of permissioned blockchain based decentralized access control system with Hyperledger Fabric. We also enforce immutable access logging mechanism to ensure all the accesses to the files are recorded on blockchain eliminating insider threat of bypassing the blockchain to provide access to a file.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
