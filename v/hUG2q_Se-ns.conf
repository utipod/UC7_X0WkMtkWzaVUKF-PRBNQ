description = "The Poisoned Well, Supply Chain Security, Open Source and Hyperledger - Vipin Bharathan, dlt.nyc\n\nA software supply chain attack happens when a malicious party modifies any part of a software development stack to compromise a target down the chain. Any user of the target can be breached using the modifications in order to attack the system directly or to deliver a malicious payload. The recently well-publicized Solar winds hack has brought this vulnerability into focus. A vulnerability that has gained in potency and reach due to widespread use of COTS and COSS software. This talk starts by covering the history of such attacks as well as the types and the lead actors in the attacks. Open source software is crucial in the software ecosystem. The openness of FOSS is leveraged by supply chain attackers. The talk is aimed at raising awareness of supply chain vulnerability in open source development. Some mitigation measures are discussed, including applicability to Hyperledger.\n\nSessions Details & Slides (if available)- https://sched.co/j3cb\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
