description = "Grafting Blockchains into Enterprise Businesses - The LEI and Digital Verifiable Credentials - Karla McKenna, GLEIF & Michal Piechocki, Business Reporting - Advisory Group \n\nEvaluation of credentials of persons acting in officially in a business capacity is a key element of trust in enterprise world. Ability to verify a digital identity of a company, organization or business, linked to a Digitally Verifiable Credential (DVC), provides a fundamental building block for the digital economy.\n\nThe Legal Entity Identifier (LEI) can have relevance in the digital world by leveraging the strength of the LEI to provide unique and permanent global identification of organizations/businesses. Coupled with DVCs issued on SOVRIN Hyperledger Indy platform the LEI with DVCs ensure trust in digital world.\n\nThis presentation demonstrates the results of the Digital Verifiable Credential Proof of Concept conducted by the Global Legal Entity Identifier Foundation (GLEIF), along with developer BR-AG,in cooperation with its network of regulators, LEI issuers and organizations/businesses developing trusted identification solutions secured by blockchain technologies.\n\nBy leveraging the LEI within digital verifiable credentials, counterparties can more easily accomplish the tasks of identity verification, authentication, and authorization.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
