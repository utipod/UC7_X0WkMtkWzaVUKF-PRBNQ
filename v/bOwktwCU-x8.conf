description = "Panel: Tower of Babel, a Panel for Translations: Asia - Alfonso Govela, Hyperledger Latinoamerica; Yang Cheng, CAICT; Aneena Ann Alexander, Saintgits College of Engineering, Kerala; Ravi Vasagam, KS Technologies; Otavio Oliveira, Binarystar Japan\n\nOur Hyperledger Community has +73,000 members in 180 meetup groups in 81 countries, and the largest number of tools and applications of DLT, distributed ledger technology. Its documentation, courses, and seminars, however, are still in English, a language 80% of the world population do not speak. This Panel is a Call for Translations. We believe that to translate is to include, to understand, to learn, and to save. Hyperledger Latinoamerica hosts this forum to review worldwide experiences translating Hyperledger Fabric and explore future strategies to engage more translators. There are two sessions. This one on Asia reviews 4 languages: Chinese, Malayalam, Tamil, and Japanese. Tower of Babel is a collaborative complement to the important efforts of Hyperledger Fabric Documentation Working Group.\n\nSession Details & Slides (if available)- https://sched.co/j446\nAccess All Sessions: https://hgf2021.sched.com/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
