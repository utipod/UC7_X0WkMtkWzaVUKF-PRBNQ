title = "Blockchains are No Longer Monolithic Programs, but Composable Applicati... James Barry & Bill Katsak"
description = "Blockchains are No Longer Monolithic Programs, but Composable Applications that Meet a Specific Need - James Barry & Bill Katsak, Taekion \n\nOver the past year the meaning of a “Blockchain” has changed as many blockchains have become focused on solving a business problem and the original crypto currencies do not have the platform that meets an enterprise need. Hyperledger offers the best selection of parts that can then be selected to build an enterprise application. Why a “Blockchain” application does have to all be from a single entity like Ethereum or Bitcoin. James and Bill will show how Taekion is using multiple components including Hyperledger Sawtooth, Ursa, Transact, and new components they will be proposing to the Hyperledger community to build a new composable distributed application that showcases why a compassable app is the future in 2020 and beyond. This presentation will showcase why Hyperledger is the perfect community to find, build & use these components to build the new vision of a distributed blockchain.\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2020 #Blockchain"
