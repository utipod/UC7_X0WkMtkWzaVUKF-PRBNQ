description = "With the rise of COVID-19, need for real-time drug supply chain assurance has never been more pressing. While healthcare leaders and front-line workers rally together and fight this disease, we believe that a blockchain-based solution capable of tracking therapeutics, test kits, vaccines, and ventilators is necessary to accelerate their efforts to protect the public.\nAs part of a peer-reviewed study commissioned by the US FDA and published in Blockchain in Healthcare Today, a Hyperledger Member LedgerDomain and UCLA Health joined forces to deploy and test BRUINchain, a last-mile blockchain-driven solution used by real caregivers to help deliver lifesaving medications. The study is among the first of its kind to reveal exactly how blockchain could save pharmacies billions of dollars in labor and safety stock costs alone.\n\nAlong with several key takeaways on the use of commercial off-the-shelf technology in a busy pharmacy, this study and ongoing research point to ways that blockchain can help bring a new level of stability and security to the health landscape.\n\nSlides are available here: https://www.hyperledger.org/wp-content/uploads/2020/07/LedgerDomain-Hyperledger-July-2020-Webinar.pdf\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain"
