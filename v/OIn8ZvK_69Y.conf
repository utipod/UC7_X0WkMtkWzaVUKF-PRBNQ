[item]
description = "Comienza a entender cómo funcionan las tecnologías de registro distribuido, las cadenas de bloques y los Smart Contracts y cómo beneficiarán a todo aquél que emprenda en este tema.\nEn este webinar nos daremos el gusto de contar con excelentes disertantes en el tema:\n\n- Sebastián Heredia Querro, Magister en derecho, actualmente Director de la Maestría en Derecho de Empresas del ICDA, escuela de negocios de la Universidad Católica de Córdoba. A poco de publicar su reciente libro “Smart contracts : qué son, para qué sirven y para qué no servirán”, nos invita a adentrarnos al mundo del blockchain y los Smart Contracts.\n\n- Diego Beltrán Ávila: ⚖️ Abogado candidato Magister en derecho de las Tecnologías TIC´s y especialista en derecho penal. Constante participe e investigador académico de tecnologías emergentes, especialmente Blockchain - y sus sectores potenciales (Criptomonedas, Desarrollos y Fintech), elaboró su trabajo de Maestría en “ El valor probatorio de Blockchain en el proceso penal” como también es autor del artículo "Derecho a la presunción de inocencia en el proceso penal: valor probatorio de la Blockchain" el cual fue seleccionado por la revista jurídica RDB de Brasil.\n\n-Jorge Ortiz tiene más de 20 años de experiencia en el sector financiero, especializado en la banca privada, gestión de activos y capital privado. Antes de sus responsabilidades actuales ocupo el cargo de Vicepresidente en Citigroup Private Bank de Nueva York y fue Director del Banco Privado de UBS en Nueva York para México. Se ha desempeñado como Mentor en varias incubadoras como Wayra, StartUp Mexico, MassChallenge, Village Capital, entre otras. Fue Presidente Fundador de FinTech México desde 2015, que actualmente es la asociación FinTech más antigua y con mayor trascendencia en Iberoamérica. También fue artífice de la llamada Ley FinTech, la primera del mundo en su género.\n\n\nhttps://www.meetup.com/Hyperledger-Argentina/events/273319957/\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerMeetups #Blockchain"
