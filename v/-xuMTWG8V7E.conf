title = "The Perun Framework: Towards Blockchain Scalability & Interoperability - Matthias Geihs, PolyCrypt"
description = "The Perun Framework: Towards Blockchain Scalability & Interoperability - Matthias Geihs, PolyCrypt GmbH\n\nThe Perun Framework is a toolkit for enabling blockchain scalability and interoperability through state channel technology, which is based on a series of renowned research papers. In this talk we want to give an overview of the Framework and how it can be used. We also want to highlight recent developments of the project and give an outlook on what's to come. Recent developments include the integration of Ethereum, Cosmos, and Polkadot blockchains. The integration of Dfinity and Fabric blockchains is in development. This means that Perun state channels can be used on all of these networks while the modular design of the Framework allows writing applications that are easy to port from one network to the other. We recently demonstrated cross-chain capabilities of Perun channels for the first time and are working on enabling this feature for all supported blockchains. Furthermore, we are looking to apply Perun channels in the context of Hyperledger Aries for enabling secure and trustless payments for verifiable credentials. \n\nSessions Details & Slides (if available): https://sched.co/14H5L\nAccess All Sessions: https://events.linuxfoundation.org/hyperledger-global-forum/program/schedule/\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nDiscord: https://discord.gg/rVCn4j7UFd\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #Blockchain\nLicense\nCreative Commons Attribution license (reuse allowed)"
