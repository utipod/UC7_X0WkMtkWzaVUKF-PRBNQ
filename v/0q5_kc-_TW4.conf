description = "Hyperledger Fabric Security Monitoring based on Hyperledger Explorer - Benedikt Putz & Fabian Böhm, University of Regensburg\n\nHyperledger Fabric is increasingly being deployed in production environments by many users, as evident from the many successful Hyperledger use cases. Thus it becomes paramount to detect attempts at attacking them. Our research focuses on monitoring Hyperledger Fabric for ongoing attacks and threats. We chose the Hyperledger Explorer project instead of a SIEM solution, since it offers a good starting point for data analytics with Hyperledger Fabric. For this purpose we extend Explorer with additional data collection and security monitoring features, while contributing bug fixes upstream. The bulk of our development work focused on developing appropriate visualizations for security experts to aid them in detecting attacks. Our talk will focus on the development of these visualizations and the technical challenges we faced with data sources and integration of these Hyperledger projects.\nSessions Details & Slides (if available)- https://sched.co/j3b9\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
