description = "Hyperledger Supply Chain SIG Presentation and Discussion "Certifying the compliance of vehicle component from design to production at Renault\n\nSynopsis\nIn 2018, Odile Panciatici, Vice President of Blockchain Projects at Renault, saw new European regulations on the horizon. These stricter regulations would come with shorter response timeframes. Using blockchain to manage the supply chain could provide real-time certification of compliance to partners, customers and regulators. That’s how the platform XCEED (eXtended Compliance End-to-End Distributed)is born. XCEED certifies compliance of all vehicle components, from design through production to aftersales. It also speeds up information sharing and creates greater efficiencies. Efficiencies that Renault wanted to share throughout the automotive industry — even among competitors. “Together we are more powerful. An innovative platform like XCEED helps us all remain sustainable. Creating a collective intelligence is necessary for the industry to thrive as technological innovations advance .The future of industry will be collaborative and cooperative.”\n\n“The value of XCEED is not for one entity. The value is for all members of the ecosystem. Instead of spending time trading files, emails, calls, we have real-time exchanges, we have transparency, and we have increased reactivity, all of which benefit our customers. Customers have authentication that their car meets environmental and safety regulations. And regulators have transparent, up-to-date, accurate data on compliance.\n\nBecause of the collaborative nature of XCEED, many ideas come from various sectors. The roadmap for where XCEED will go has several planned destinations already. And as more companies and ideas join the project, Panciatici expects that roadmap to extend beyond current plans. “What’s wonderful about XCEED is now that we’ve created the basis of the ecosystem, there are a lot of opportunities coming. We have years of additional features to add, which gives always more value to the project.” And it’s also an opportunity to onboard other industry participants in aeronautics, for example. \n\nLearn more about the Hyperledger Supply Chain SIG:\nhttps://wiki.hyperledger.org/display/SCSIG/Supply+Chain+SIG\n\n----\nHyperledger – Open Source Blockchain Technologies\n\nHyperledger is an open source community focused on developing a suite of stable frameworks, tools and libraries for enterprise-grade blockchain deployments.\nIt serves as a neutral home for various distributed ledger frameworks including Hyperledger Besu, Fabric, Sawtooth, Indy, as well as tools like Hyperledger Avalon, Cactus and libraries like Hyperledger Aries, Ursa. Learn more about Hyperledger projects: https://www.hyperledger.org/use\n\nCase Studies: https://www.hyperledger.org/learn/case-studies\nTraining & Certification: https://www.hyperledger.org/learn/training\nTutorials: https://www.hyperledger.org/use/tutorials\nWebinars: https://www.hyperledger.org/learn/webinars\nEvents: https://www.hyperledger.org/events \nVendor Directory: https://www.hyperledger.org/use/vendor-directory \n\nSubscribe to the Hyperledger Newsletter: https://www.hyperledger.org/newsletter\n\nFollow-us on Twitter @Hyperledger \n\nLearn about Hyperledger Membership: https://www.hyperledger.org/about/join\n\n#Hyperledger #HyperledgerGlobalForum2021 #Blockchain"
